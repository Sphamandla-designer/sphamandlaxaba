document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

isImportant=!!o.important; o.hasIntro=!!o.intro;\n    o.hasReasons=o.reasons.length>0; o.hasAiFields=o.aiFields.length>0; o.hasNote=!!o.note;\n    o.hasBody=!!o.body; o.hasFields=o.fields.length>0; o.hasGuide=!!o.guide; o.hasLocalized=!!o.localizedEn;\n    if(o.kind==='ai'){\n      o.hasConf = typeof o.confidence==='number';\n      const cf = o.confidence || 0;\n      o.confColor = cf>=80 ? '#1B7F4B' : cf>=55 ? '#B26B00' : '#C26A2B';\n      o.confStyle = { width:cf+'%', height:'100%', borderRadius:'3px', background:o.confColor };\n    }\n    if(o.kind==='status'){\n      const tone = o.tone || 'wait';\n      const T = {\n        good:{ bg:'#E7F7EC', fg:'#1B7F4B', chip:'#1B7F4B' },\n        warn:{ bg:'#FBF3E0', fg:'#9A5B00', chip:'#B26B00' },\n        wait:{ bg:'#ECF1F8', fg:'#2E5AAC', chip:'#2E5AAC' },\n        bad: { bg:'#F1EFEC', fg:'#44403C', chip:'#57534E' },\n      };\n      const c = T[tone];\n      o.isGood=tone==='good'; o.isWarn=tone==='warn'; o.isWait=tone==='wait'; o.isBad=tone==='bad';\n      o.headStyle = { background:c.bg, padding:'12px 14px', display:'flex', gap:'11px', alignItems:'center' };\n      o.chipStyle = { width:'30px', height:'30px', borderRadius:'9px', background:c.chip, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' };\n      o.titleStyle = { fontSize:'14.5px', fontWeight:700, color:c.fg, lineHeight:1.25 };\n    }\n    if(o.kind==='summary' && o.progress){\n      const p = o.progress;\n      o.progressLabel = p.done + ' / ' + p.total;\n      o.sumFillStyle = { width: Math.round(p.done/p.total*100)+'%', height:'100%', background:'#0F766E', borderRadius:'4px' };\n      o.hasProgress = true;\n    }\n    return o;\n  }\n\n  buildBeat(beat){\n    const raw = typeof beat.msgs === 'function' ? beat.msgs(this.ctx()) : beat.msgs;\n    return raw.map(m => this.norm(m, beat.time));\n  }\n\n  beatTime(){\n    const b = this.beatList()[this.state.current];\n    return b ? b.time : '09:30';\n  }\n\n  reset(){\n    clearTimeout(this._t);\n    this._mid = 0;\n    const b0 = this.beatList()[0];\n    this.setState({ messages:this.buildBeat(b0), quick:b0.quick, typing:false, current:0, outcome:null, lang:'en' });\n  }\n\n  advance(){\n    const ni = this.state.current + 1;\n    if(ni > 13) return;\n    const beat = this.beatList()[ni];\n    const msgs = this.buildBeat(beat);\n    const outs = msgs.filter(m => m.side==='out');\n    const rest = msgs.filter(m => m.side!=='out');\n    this.setState(st => ({ current:ni, outcome:null, quick:[], typing:rest.length>0, messages:[...st.messages, ...outs] }));\n    clearTimeout(this._t);\n    if(rest.length){\n      this._t = setTimeout(() => {\n        this.setState(st => ({ messages:[...st.messages, ...rest], typing:false, quick:beat.quick }));\n      }, 820);\n    } else {\n      this.setState({ quick:beat.quick });\n    }\n  }\n\n  jumpTo(n){\n    clearTimeout(this._t);\n    const list = this.beatList();\n    let all = [];\n    for(let i=0; i<=n; i++){ all = all.concat(this.buildBeat(list[i])); }\n    this.setState({ messages:all, quick:list[n].quick, typing:false, current:n, outcome:null });\n  }\n\n  showOutcome(id){\n    clearTimeout(this._t);\n    const list = this.beatList();\n    let all = [];\n    for(let i=0; i<=13; i++){ all = all.concat(this.buildBeat(list[i])); }\n    const o = this.outcomes()[id];\n    all = all.concat(o.msgs.map(m => this.norm(m, o.time)));\n    this.setState({ messages:all, quick:o.quick, typing:false, current:13, outcome:id });\n  }\n\n  handleQuick(q){\n    const a = q.action || 'next';\n    if(a === 'next') return this.advance();\n    if(a === 'restart') return this.reset();\n    if(a.indexOf('lang:') === 0){ this.setState({ lang:a.slice(5) }, () => this.advance()); return; }\n    if(a.indexOf('goto:') === 0){\n      const id = a.slice(5);\n      const idx = this.beatList().findIndex(b => b.id === id);\n      return this.jumpTo(idx < 0 ? 0 : idx);\n    }\n    // helper actions (help / example / support / note) — push extra, keep buttons\n    const extra = q.extra || (a === 'support' ? [this.supportCard()] : []);\n    if(!extra.length) return;\n    const keep = this.state.quick;\n    clearTimeout(this._t);\n    this.setState({ quick:[], typing:true });\n    this._t = setTimeout(() => {\n      const norm = extra.map(m => this.norm(m, this.beatTime()));\n      this.setState(st => ({ messages:[...st.messages, ...norm], typing:false, quick:keep }));\n    }, 680);\n  }\n\n  renderVals(){\n    const s = this.state;\n    const headerColor = this.props.headerColor || '#075E54';\n    const businessName = this.props.businessName || 'Home Assist';\n    const list = this.beatList();\n    const progress = s.outcome ? this.outcomeProgress(s.outcome) : (list[s.current] ? list[s.current].progress : 0);\n\n    const quick = (s.quick || []).map(q => {\n      const primary = q.kind === 'primary';\n      const bg = primary ? '#0F766E' : '#FFFFFF';\n      const fg = primary ? '#FFFFFF' : '#0F766E';\n      const border = primary ? '#0F766E' : '#D9D2C7';\n      const sub = primary ? 'rgba(255,255,255,.82)' : '#8A9299';\n      return Object.assign({}, q, {\n        isPrimary:primary, hasSub:!!q.sub, hasIcon:!!q.icon,\n        iconCamera:q.icon==='camera', iconRefresh:q.icon==='refresh', iconSupport:q.icon==='support',\n        iconHelp:q.icon==='help', iconPlay:q.icon==='play', iconCheck:q.icon==='check',\n        btnFg:fg,\n        style:{ display:'flex', alignItems:'center', gap:'11px', width:'100%', minHeight:'52px', padding:'10px 14px', borderRadius:'12px', cursor:'pointer', textAlign:'left', fontFamily:'inherit', border:'1px solid '+border, background:bg, boxShadow: primary ? '0 2px 5px rgba(15,118,110,.28)' : '0 1px 1.5px rgba(0,0,0,.06)' },\n        labelStyle:{ fontSize:'15px', fontWeight:600, color:fg, lineHeight:1.2 },\n        subStyle:{ fontSize:'12px', color:sub, marginTop:'1px' },\n        onClick: () => this.handleQuick(q),\n      });\n    });\n\n    let num = 0;\n    const def = [\n      ['Start', [['Conversation entry',0],['Language selection',1],['Job summary',2]]],\n      ['Evidence capture', [['Before photo — guidance',3],['Before photo — retake',4],['Before photo — captured',5]]],\n      ['Serial number', [['Serial — guidance',6],['Serial — retake',7],['Serial — captured',8]]],\n      ['Compliance', [['Compliance checklist',9],['Compliance upload',10]]],\n      ['Submit', [['Offline & recovery',11],['Submitted',12],['In review',13]]],\n      ['Outcomes', [['Approved','approved'],['Needs a retake','retake'],['Needs assistance','rejected']]],\n    ];\n    const groups = def.map(([name, items]) => ({\n      name,\n      items: items.map(([label, go]) => {\n        num++;\n        const isNum = typeof go === 'number';\n        const active = isNum ? (!s.outcome && s.current===go) : (s.outcome===go);\n        const done = isNum && !s.outcome && go < s.current;\n        return {\n          label, num:(num<10?'0':'')+num,\n          style:{ display:'flex', alignItems:'center', gap:'9px', width:'100%', padding:'7px 9px', borderRadius:'9px', border:'1px solid '+(active?'#BFE0D9':'transparent'), background: active?'#E7F1EF':'transparent', cursor:'pointer', textAlign:'left', fontFamily:'inherit', marginBottom:'3px' },\n          numStyle:{ fontSize:'10px', fontWeight:700, width:'22px', height:'20px', borderRadius:'5px', display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0, background: active?'#0F766E':(done?'#D7E5E1':'#EFEDE8'), color: active?'#fff':(done?'#0F766E':'#9aa0a4') },\n          labelStyle:{ fontSize:'12.5px', fontWeight: active?600:500, color: active?'#134E48':'#48555c', lineHeight:1.25 },\n          onClick: isNum ? (() => this.jumpTo(go)) : (() => this.showOutcome(go)),\n        };\n      })\n    }));\n\n    return {\n      headerColor, businessName,\n      headerStyle:{ background:headerColor },\n      statusText: s.typing ? 'typing…' : 'online',\n      isTyping: s.typing,\n      messages: s.messages,\n
