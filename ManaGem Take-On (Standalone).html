ermanent','Contractor','Fixed-term']},\n    {key:'phone', label:'Phone', ph:'+27 …'},\n  ],\n  suppliers: [\n    {key:'name', label:'Supplier name', ph:'e.g. Sika SA'},\n    {key:'contact', label:'Contact person', ph:''},\n    {key:'phone', label:'Phone', ph:'+27 …'},\n    {key:'terms', label:'Payment terms', ph:'e.g. 30 days'},\n  ],\n};\n\nconst ADMIN_QUEUE = [\n  {name:'Sunbird Roofing & Waterproofing', stage:4, status:'Client reviewing extracted data', updated:'12 min ago', compliance:{popia:true,ai:true,encryption:true,audit:true}, complianceScore:100, reviewDuration:'~5 min', riskLevel:'Low'},\n  {name:'Kloof Pool Solutions', stage:5, status:'Awaiting GEMIS QA sign-off', updated:'1 hour ago', flagged:2, compliance:{popia:true,ai:true,encryption:true,audit:true}, complianceScore:100, reviewDuration:'~9 min', riskLevel:'Medium'},\n  {name:'Highveld Facilities Group', stage:2, status:'Documents uploading', updated:'3 hours ago', compliance:{popia:true,ai:false,encryption:true,audit:true}, complianceScore:75, reviewDuration:'—', riskLevel:'Low'},\n  {name:'Delta Construction Supplies', stage:5, status:'Awaiting GEMIS QA sign-off', updated:'Yesterday', flagged:0, compliance:{popia:true,ai:true,encryption:true,audit:true}, complianceScore:100, reviewDuration:'~4 min', riskLevel:'Low'},\n  {name:'Karoo Trade & Hardware', stage:6, status:'Synced to ManaGem', updated:'2 days ago', compliance:{popia:true,ai:true,encryption:true,audit:true}, complianceScore:100, reviewDuration:'~6 min', riskLevel:'Low'},\n];\n\n/* ---------------- STATE ---------------- */\nlet state = {\n  screen: 'welcome',\n  view: 'client', // client | admin\n  uploads: {company:[], customers:[], products:[], staff:[], suppliers:[]},\n  manualMode: {customers:false, products:false, staff:false, suppliers:false},\n  manual: {customers:[], products:[], staff:[], suppliers:[]},\n  drawer: null,\n  policyDrawer: null,\n  filter: {customers:'all', products:'all', staff:'all'},\n  accepted: {customers:new Set(), products:new Set(), staff:new Set()},\n  logLines: [],\n  consents: {authorised:false, processing:false, aiUnderstanding:false, reviewUnderstanding:false, policies:false},\n  finalApproval:false,\n  auditLog: [],\n  sessionStart: Date.now(),\n  showReport:false,\n  submittedRef:null,\n};\n\nfunction stepIndex(id){ return STEPS.findIndex(s=>s.id===id); }\nfunction confBadge(c, issue){\n  const map = {high:['emerald','check','Verified'], medium:['amber','alert','Needs review'], low:['red','alert','Low confidence'], dupe:['purple','info','Possible duplicate'], manual:['sky','edit','Entered manually']};\n  const [variant, ic, label] = map[c];\n  return `<span class=\"badge badge-${variant}\" title=\"${issue?issue.replace(/\"/g,'&quot;'):''}\">${icon(ic,10)}${label}<\u002Fspan>`;\n}\n\n/* ---------------- RENDER ---------------- */\nfunction render(){\n  const app = document.getElementById('app');\n  app.innerHTML = `\n    ${renderTopbrand()}\n    ${state.view==='client' ? renderStepper() : ''}\n    ${state.view==='client' && stepIndex(state.screen)>=1 ? renderTrustBar() : ''}\n    <div class=\"main\"><div class=\"wrap\">\n      ${state.view==='admin' ? renderAdminQueue() : renderScreen()}\n    <\u002Fdiv><\u002Fdiv>\n    ${state.view==='client' && !state.showReport ? renderFooterNav() : ''}\n    ${renderDrawer()}\n    ${renderPolicyDrawer()}\n  `;\n  attachEvents();\n}\n\nfunction renderTrustBar(){\n  return `\n  <div class=\"trustbar\">\n    <span class=\"tb-label\">${icon('shield-check',13,'#0EA5E9')} Secured onboarding session<\u002Fspan>\n    <div class=\"tb-badges\">\n      <span class=\"badge badge-emerald\">${icon('lock',10)} 256-bit encrypted<\u002Fspan>\n      <span class=\"badge badge-sky\">${icon('shield',10)} POPIA compliant<\u002Fspan>\n      <span class=\"badge badge-emerald\">${icon('scan',10)} Virus scanned<\u002Fspan>\n      <span class=\"badge badge-slate\">${icon('history',10)} Full audit trail<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction renderTopbrand(){\n  return `\n  <div class=\"topbrand\">\n    <div class=\"mark\">G<\u002Fdiv>\n    <div class=\"title\">ManaGem Take-On<\u002Fdiv>\n    <div class=\"sub\">Client Onboarding<\u002Fdiv>\n    <div class=\"spacer\"><\u002Fdiv>\n    <div class=\"viewswitch\">\n      <button data-view=\"client\" class=\"${state.view==='client'?'active':''}\">Client view<\u002Fbutton>\n      <button data-view=\"admin\" class=\"${state.view==='admin'?'active':''}\">GEMIS admin<\u002Fbutton>\n    <\u002Fdiv>\n    <span class=\"pill\" style=\"margin-left:14px;\"><span class=\"dot\"><\u002Fspan> SBS Waterproofing (Pty) Ltd<\u002Fspan>\n  <\u002Fdiv>`;\n}\n\nfunction renderStepper(){\n  const cur = stepIndex(state.screen);\n  return `\n  <div class=\"stepperbar\"><div class=\"stepper\">\n    ${STEPS.map((s,i)=>`\n      <div class=\"step ${i===cur?'active':i<cur?'done':''}\">\n        <div class=\"num\">${i<cur?icon('check',12,'#fff'):i+1}<\u002Fdiv>\n        <div class=\"label\">${s.label}<\u002Fdiv>\n      <\u002Fdiv>\n      ${i<STEPS.length-1?'<div class=\"connector\"><\u002Fdiv>':''}\n    `).join('')}\n  <\u002Fdiv><\u002Fdiv>`;\n}\n\nconst screenValidators = {\n  trust: () => Object.values(state.consents).every(Boolean),\n  upload: () => unsatisfiedRequired().length===0,\n  summary: () => state.finalApproval,\n};\nfunction renderFooterNav(){\n  const cur = stepIndex(state.screen);\n  const isFirst = cur===0;\n  if(state.screen==='success') return '';\n  const validator = screenValidators[state.screen];\n  const blocked = validator ? !validator() : false;\n  const blockTitle = {\n    trust:'Accept all consents to continue',\n    upload:'Add the required documents, or add them manually, to continue',\n    summary:'Confirm the final declaration to submit'\n  }[state.screen] || '';\n  return `\n  <div class=\"footer-nav\">\n    <button class=\"btn btn-ghost\" id=\"btnBack\" ${isFirst?'disabled':''}>${icon('arrowright',14).replace('12 5 19 12 12 19','19 12 5 12').replace('5\" y1=\"12\" x2=\"19','19\" y1=\"12\" x2=\"5')} Back<\u002Fbutton>\n    <button class=\"btn btn-primary\" id=\"btnNext\" ${blocked?`disabled title=\"${blockTitle}\"`:''}>${nextLabel()} ${icon('arrowright',14)}<\u002Fbutton>\n  <\u002Fdiv>`;\n}\nfunction nextLabel(){\n  const map = {welcome:'Start onboarding', trust:'Accept & continue', profile:'Continue to documents', upload:'Run AI extraction',\n    processing:'Continue to review', validation:'Review records', customers:'Continue to products', products:'Continue to staff',\n    staff:'Continue to summary', summary:'Submit for GEMIS review'};\n  return map[state.screen] || 'Continue';\n}\n\n/* ---------- Screen router ---------- */\nfunction renderScreen(){\n  if(state.showReport) return screenReport();\n  switch(state.screen){\n    case 'welcome': return screenWelcome();\n    case 'trust': return screenTrust();\n    case 'profile': return screenProfile();\n    case 'upload': return screenUpload();\n    case 'processing': return screenProcessing();\n    case 'validation': return screenValidation();\n    case 'customers': return screenReview('customers', CUSTOMERS, customerCols);\n    case 'products': return screenReview('products', PRODUCTS, productCols);\n    case 'staff': return screenReview('staff', STAFF, staffCols);\n    case 'summary': return screenSummary();\n    case 'success': return screenSuccess();\n    default: return '';\n  }\n}\n\nfunction screenWelcome(){\n  return `\n  <div class=\"hero\">\n    <h1>Let's bring your business into ManaGem<\u002Fh1>\n    <p>Upload the documents you already have — customer lists, price lists, staff records — and our AI will read them, structure the data, and get it ready for your review. Nothing goes live until you've confirmed it.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"card card-pad startcard\">\n    <div class=\"checklist\">\n      <div class=\"checkline\"><div class=\"ic\">${icon('file')}<\u002Fdiv><div><div class=\"tt\">Upload what you have<\u002Fdiv><div class=\"dd\">Spreadsheets, PDFs, scanned pages, even a WhatsApp export. No document for something? You can type it in directly instead.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"checkline\"><div class=\"ic\">${icon('sparkle')}<\u002Fdiv><div><div class=\"tt\">AI reads and structures it<\u002Fdiv><div class=\"dd\">Customers, products, pricing and staff are extracted and matched to ManaGem's fields automatically.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"checkline\"><div class=\"ic\">${icon('eye')}<\u002Fdiv><div><div class=\"tt\">You review and correct<\u002Fdiv><div class=\"dd\">Every record shows how confident the AI is, and you can fix, merge or reject anything before it's confirmed.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"checkline\"><div class=\"ic\">${icon('check-circle')}<\u002Fdiv><div><div class=\"tt\">GEMIS does a final check, then it's live<\u002Fdiv><div class=\"dd\">A short GEMIS review — not a full re-capture — and your data is in ManaGem, ready to use.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"timeest\">${icon('clock',14)} Most companies finish in 20–35 minutes, depending on how many documents you have.<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction screenTrust(){\n  const c = state.consents;\n  const cards = [\n    {ic:'shield', tt:'POPIA compliant', dd:'Your data is processed under South Africa’s Protection of Personal Information Act. You stay the responsible party; GEMIS is your operator.'},\n    {ic:'lock', tt:'Encrypted end to end', dd:'Every document is encrypted in transit and at rest with 256-bit encryption. Only your onboarding session can read it back.'},\n    {ic:'sparkle', tt:'Responsible AI', dd:'The AI only structures what you upload — it never invents data. Every field is traceable to a source and shown with a confidence score.'},\n    {ic:'history', tt:'Full audit trail', dd:'Every upload, extraction and edit is timestamped and logged, so there’s a complete record of how your data reached ManaGem.'},\n  ];\n  return `\n  <div class=\"hero\">\n    <h1>Before we start — how your data is handled<\u002Fh1>\n    <p>A quick, plain-language summary of how ManaGem Take-On keeps your business information secure and compliant. Please confirm the points below to continue.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"summarygrid\" style=\"grid-template-columns:repeat(2,1fr);max-width:820px;margin:0 auto 22px;\">\n    ${cards.map(k=>`<div class=\"sumcard\"><div class=\"hd\"><div class=\"ic\">${icon(k.ic,16)}<\u002Fdiv><div class=\"tt\">${k.tt}<\u002Fdiv><\u002Fdiv><div style=\"font-size:12.5px;line-height:1.6;color:var(--text-2);\">${k.dd}<\u002Fdiv><\u002Fdiv>`).join('')}\n  <\u002Fdiv>\n\n  <div style=\"max-width:820px;margin:0 auto;\">\n  <!-- LEGAL COPY: placeholder, needs sign-off -->\n  <div class=\"card card-pad\" style=\"margin-bottom:14px;\">\n    <h3 style=\"margin-bottom:10px;\">Data Processing Agreement <span class=\"badge badge-slate\" style=\"font-weight:600;\">Summary<\u002Fspan><\u002Fh3>\n    <div class=\"agreement-prose\">\n      <p>This agreement sets out how GEMIS (“the Operator”) processes personal information on behalf of your company (“the Responsible Party”) for the sole purpose of onboarding your business onto the ManaGem platform.<\u002Fp>\n      <p>GEMIS processes only the data you provide, only for onboarding, and only for as long as needed to complete it and meet legal retention requirements. Your data is never sold, and never used to train third-party models.<\u002Fp>\n      <p>You may request a copy, correction or deletion of your data at any time. A full copy of this agreement and the underlying policies is available from the links below.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"consent-group\">\n    <div class=\"cg-title\">Authorisation &amp; consent<\u002Fdiv>\n    <label class=\"consent-row\"><input type=\"checkbox\" data-consent=\"authorised\" ${c.authorised?'checked':''}><span class=\"ctext\"><b>I am authorised<\u002Fb> to share this company’s data and to enter into this onboarding on its behalf.<\u002Fspan><\u002Flabel>\n    <label class=\"consent-row\"><input type=\"checkbox\" data-consent=\"processing\" ${c.processing?'checked':''}><span class=\"ctext\">I consent to GEMIS <b>processing this data<\u002Fb> for the purpose of onboarding onto ManaGem, as described in the agreement above.<\u002Fspan><\u002Flabel>\n  <\u002Fdiv>\n\n  <div class=\"consent-group\">\n    <div class=\"cg-title\">Understanding AI’s role<\u002Fdiv>\n    <label class=\"consent-row\"><input type=\"checkbox\" data-consent=\"aiUnderstanding\" ${c.aiUnderstanding?'checked':''}><span class=\"ctext\">I understand the <b>AI structures my documents<\u002Fb> and may occasionally misread them — it does not make final decisions on its own.<\u002Fspan><\u002Flabel>\n    <label class=\"consent-row\"><input type=\"checkbox\" data-consent=\"reviewUnderstanding\" ${c.reviewUnderstanding?'checked':''}><span class=\"ctext\">I understand <b>I will review and confirm<\u002Fb> every category, and nothing goes live until I approve it and GEMIS completes its check.<\u002Fspan><\u002Flabel>\n  <\u002Fdiv>\n\n  <div class=\"consent-group\">\n    <div class=\"cg-title\">Policies<\u002Fdiv>\n    <label class=\"consent-row\"><input type=\"checkbox\" data-consent=\"policies\" ${c.policies?'checked':''}><span class=\"ctext\">I have read and accept the <b>ManaGem policies<\u002Fb> governing privacy, data processing, security and retention.<\u002Fspan><\u002Flabel>\n    <div class=\"policy-links\">\n      <a data-policy=\"Privacy Policy\">${icon('file',11)} Privacy Policy<\u002Fa>\n      <a data-policy=\"Data Processing Agreement\">${icon('file',11)} Data Processing Agreement<\u002Fa>\n      <a data-policy=\"Security Overview\">${icon('shield',11)} Security Overview<\u002Fa>\n      <a data-policy=\"Data Retention Policy\">${icon('history',11)} Retention Policy<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction screenProfile(){\n  return `\n  <div class=\"page-header\"><div><div class=\"page-title\">Company profile<\u002Fdiv><div class=\"page-sub\">This sets up your ManaGem tenant — you can edit it later in Settings.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"card card-pad\">\n    <div style=\"display:flex;gap:20px;align-items:flex-start;margin-bottom:8px;\">\n      <div class=\"logodrop\">${icon('upload',18)}<br>Upload logo<\u002Fdiv>\n      <div style=\"flex:1;\" class=\"formgrid\">\n        <div class=\"field\"><label>Registered company name<\u002Flabel><input value=\"SBS Waterproofing (Pty) Ltd\"><\u002Fdiv>\n        <div class=\"field\"><label>Trading name<\u002Flabel><input value=\"SBS Waterproofing\"><\u002Fdiv>\n        <div class=\"field\"><label>Company registration no.<\u002Flabel><input value=\"2014/123456/07\"><\u002Fdiv>\n        <div class=\"field\"><label>VAT number<\u002Flabel><input value=\"4480123456\"><\u002Fdiv>\n        <div class=\"field\"><label>Primary contact email<\u002Flabel><input value=\"admin@sbswaterproofing.co.za\"><\u002Fdiv>\n        <div class=\"field\"><label>Primary contact phone<\u002Flabel><input value=\"+27 11 234 5678\"><\u002Fdiv>\n        <div class=\"field\"><label>Industry<\u002Flabel>\n          <select><option>Waterproofing & Roofing<\u002Foption><option>Pool Installation<\u002Foption><option>General Construction<\u002Foption><option>Facilities Management<\u002Foption><\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"field\"><label>Accounting system <span class=\"hint\">(for Sage sync)<\u002Fspan><\u002Flabel>\n          <select><option>Sage Business Cloud<\u002Foption><option>Sage One<\u002Foption><option>None yet<\u002Foption><\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\" style=\"margin-top:4px;\"><label>Business address<\u002Flabel><textarea rows=\"2\">12 Industria Rd, Sandton, Gauteng, 2196<\u002Ftextarea><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nconst UPLOAD_CATS = [\n  {id:'customers', tt:'Customer list', req:true, icon:'users', desc:'Any spreadsheet, CRM export, or invoice history with your existing customers and their contact details.'},\n  {id:'products', tt:'Product & price list', req:true, icon:'package', desc:\"Your current pricing — a formal price list, a supplier catalog, or even last month's quotes.\"},\n  {id:'staff', tt:'Staff records', req:false, icon:'users', desc:'Employee list with job titles, departments and contact info, for setting up ManaGem user accounts.'},\n  {id:'suppliers', tt:'Supplier list', req:false, icon:'building', desc:'Suppliers you order stock or materials from, with contact and payment terms if you have them.'},\n  {id:'company', tt:'Company documents', req:false, icon:'file', desc:'Registration certificate (CIPC), letterhead, or branding assets for your quotes and invoices.'},\n];\nfunction catSatisfied(id){\n  return (state.uploads[id]||[]).length>0 || (state.manual[id]||[]).length>0;\n}\nfunction unsatisfiedRequired(){\n  return UPLOAD_CATS.filter(c=>c.req && !catSatisfied(c.id));\n}\nfunction screenUpload(){\n  const missing = unsatisfiedRequired();\n  return `\n  <div class=\"page-header\"><div><div class=\"page-title\">Upload your documents<\u002Fdiv><div class=\"page-sub\">Drop in whatever format you already have — our AI handles the structuring. Don't have a document for something? You can type it in instead.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  ${missing.length ? `<div class=\"reqwarn\">${icon('alert',14)} <span>Still needed to continue: <b>${missing.map(m=>m.tt).join(', ')}<\u002Fb> — upload a document, or use \"Add manually\" on that card.<\u002Fspan><\u002Fdiv>` : ''}\n  <div class=\"card card-pad\" style=\"margin-bottom:16px;\">\n    <div class=\"checkline\" style=\"align-items:center;\"><div class=\"ic\" style=\"background:var(--emerald-light);color:var(--emerald);\">${icon('shield-check',16)}<\u002Fdiv><div><div class=\"tt\">Uploading securely<\u002Fdiv><div class=\"dd\">Every file is encrypted, virus-scanned and logged the moment it lands — you’ll see each step confirmed on the file itself.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"uploadgrid\">\n    ${UPLOAD_CATS.map(c=>{\n      const files = state.uploads[c.id];\n      const manualRows = state.manual[c.id] || [];\n      const canManual = !!MANUAL_FIELDS[c.id];\n      const open = state.manualMode[c.id];\n      return `\n      <div class=\"dropzone ${(files.length||manualRows.length)?'hasfiles':''}\">\n        <div class=\"dz-hd\">\n          <div class=\"dz-icon\">${icon(c.icon,17)}<\u002Fdiv>\n          <div><span class=\"tt\">${c.tt}<\u002Fspan>${c.req?'<span class=\"req\">Required<\u002Fspan>':'<span class=\"opt\">Optional<\u002Fspan>'}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dz-desc\">${c.desc}<\u002Fdiv>\n        <div class=\"dz-body\" data-upload=\"${c.id}\">${icon('upload',18)}<div style=\"margin-top:6px;\">Drag files here or <b style=\"color:var(--sky)\">browse<\u002Fb><br><span style=\"font-size:10.5px;\">PDF, XLSX, CSV, DOCX, JPG, PNG<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        ${files.map((f,i)=>`\n          <div class=\"filerow\"><div class=\"fic\">${icon('file',13)}<\u002Fdiv><div class=\"nm\">${f.name}<\u002Fdiv><div class=\"sz\">${f.size}<\u002Fdiv>\n          ${f.secured\n            ? `<span class=\"badge badge-emerald\" style=\"padding:2px 7px;\">${icon('lock',9)} Encrypted<\u002Fspan><span class=\"badge badge-emerald\" style=\"padding:2px 7px;\">${icon('scan',9)} Scanned<\u002Fspan>`\n            : `<span class=\"badge badge-slate\" style=\"padding:2px 7px;\">${icon('lock',9)} Securing…<\u002Fspan>`}\n          <span class=\"sz\" title=\"Uploaded\">${f.time||''}<\u002Fspan>\n          <button class=\"rm\" data-rmfile=\"${c.id}:${i}\">${icon('x',14)}<\u002Fbutton><\u002Fdiv>\n        `).join('')}\n        ${canManual ? `\n          <button class=\"manuallink\" data-togglemanual=\"${c.id}\">${icon(open?'x':'plus',11)} ${open?'Hide manual entry':`No document for this? Add ${c.tt.toLowerCase()} manually`}<\u002Fbutton>\n          ${open ? renderManualPanel(c.id) : ''}\n          ${(!open && manualRows.length) ? manualRows.map((r,i)=>manualRowHtml(c.id,r,i)).join('') : ''}\n        ` : ''}\n      <\u002Fdiv>`;\n    }).join('')}\n  <\u002Fdiv>`;\n}\n\nfunction renderManualPanel(catId){\n  const fields = MANUAL_FIELDS[catId];\n  const rows = state.manual[catId];\n  return `\n  <div class=\"manualpanel\">\n    <div class=\"mp-note\">${icon('keyboard',13)} Type in what you know — you can still upload a document for this later too.<\u002Fdiv>\n    <div class=\"mp-form\">\n      ${fields.map(f=>`\n        <div class=\"mf\"><label>${f.label}<\u002Flabel>\n          ${f.select ? `<select id=\"mf-${catId}-${f.key}\"><option value=\"\">${f.ph||'Select'}<\u002Foption>${f.select.map(o=>`<option>${o}<\u002Foption>`).join('')}<\u002Fselect>`\n          : `<input id=\"mf-${catId}-${f.key}\" placeholder=\"${f.ph}\">`}\n        <\u002Fdiv>`).join('')}\n      <button class=\"btn btn-secondary btn-sm mp-addbtn\" data-addmanual=\"${catId}\">${icon('plus',13)} Add ${catId==='customers'?'customer':catId==='products'?'product':catId==='staff'?'staff member':'supplier'}<\u002Fbutton>\n    <\u002Fdiv>\n    ${rows.map((r,i)=>manualRowHtml(catId,r,i)).join('')}\n  <\u002Fdiv>`;\n}\nfunction manualRowSummary(catId, r){\n  if(catId==='customers') return {title:r.name||'Untitled customer', meta:[r.type,r.contact].filter(Boolean).join(' · ')};\n  if(catId==='products') return {title:r.desc||'Untitled product', meta:[r.cat,r.price?('R '+r.price):''].filter(Boolean).join(' · ')};\n  if(catId==='staff') return {title:r.name||'Untitled staff member', meta:[r.role,r.dept].filter(Boolean).join(' · ')};\n  return {title:r.name||'Untitled supplier', meta:[r.contact,r.terms].filter(Boolean).join(' · ')};\n}\nfunction manualRowHtml(catId, r, i){\n  const s = manualRowSummary(catId, r);\n  return `<div class=\"manualrow\"><div class=\"mic\">${icon('edit',12)}<\u002Fdiv><div class=\"nm\">${s.title}<\u002Fdiv><div class=\"meta\">${s.meta}<\u002Fdiv>\n    <button class=\"rm\" data-rmmanual=\"${catId}:${i}\">${icon('x',14)}<\u002Fbutton><\u002Fdiv>`;\n}\n\nfunction screenProcessing(){\n  return `\n  <div class=\"proc-wrap\" style=\"max-width:960px;\">\n    <div class=\"scan-box\">\n      <div class=\"scan-docs\">\n        ${['Client_Ledger_2025.xlsx','Price_List_2026.pdf','Staff_Register.xlsx','Invoice_Batch_Mar.pdf'].map(n=>`<div class=\"scan-doc\">${icon('file',18,'#93C5FD')}<\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n      <div class=\"scan-title\">Reading your documents…<\u002Fdiv>\n      <div class=\"scan-sub\">Extracting records and matching them to ManaGem's data structure<\u002Fdiv>\n      <div class=\"scan-counters\">\n        <div class=\"scan-counter\"><div class=\"n\" id=\"cnt-customers\">0<\u002Fdiv><div class=\"l\">Customers<\u002Fdiv><\u002Fdiv>\n        <div class=\"scan-counter\"><div class=\"n\" id=\"cnt-products\">0<\u002Fdiv><div class=\"l\">Products<\u002Fdiv><\u002Fdiv>\n        <div class=\"scan-counter\"><div class=\"n\" id=\"cnt-staff\">0<\u002Fdiv><div class=\"l\">Staff<\u002Fdiv><\u002Fdiv>\n        <div class=\"scan-counter\"><div class=\"n\" id=\"cnt-flags\">0<\u002Fdiv><div class=\"l\">Flagged<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"proc-two\">\n      <div class=\"auditpanel\">\n        <div class=\"ap-hd\">${icon('sparkle',14,'#0EA5E9')} Extraction log<\u002Fdiv>\n        <div class=\"proglog\" id=\"proglog\" style=\"border:none;border-radius:0;max-height:240px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"auditpanel\">\n        <div class=\"ap-hd\">${icon('shield-check',14,'#10B981')} Audit activity<\u002Fdiv>\n        <div class=\"ap-body\" id=\"auditpanel\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction screenValidation(){\n  const cats = [\n    {data:CUSTOMERS, label:'Customers'},\n    {data:PRODUCTS, label:'Products'},\n    {data:STAFF, label:'Employees'},\n  ];\n  const docCount = Object.values(state.uploads).reduce((a,f)=>a+f.length,0) || 4;\n  const totalRecords = cats.reduce((a,c)=>a+c.data.length,0);\n  const all = CUSTOMERS.concat(PRODUCTS, STAFF);\n  const high = all.filter(r=>r.conf==='high'||r.conf==='manual').length;\n  const med = all.filter(r=>r.conf==='medium').length;\n  const low = all.filter(r=>r.conf==='low').length;\n  const dupe = all.filter(r=>r.conf==='dupe').length;\n  const readyPct = Math.round((high/totalRecords)*100 + 0.5*((med)/totalRecords)*100);\n  const pct = Math.min(97, Math.max(readyPct, 88));\n  const hiPct = Math.round((high/totalRecords)*100);\n  const medPct = Math.round((med/totalRecords)*100);\n  const loPct = 100 - hiPct - medPct;\n\n  const kpis = [\n    {n:docCount, l:'Documents processed', cls:''},\n    {n:CUSTOMERS.length, l:'Customers detected', cls:''},\n    {n:PRODUCTS.length, l:'Products detected', cls:''},\n    {n:STAFF.length, l:'Employees detected', cls:''},\n  ];\n  return `\n  <div class=\"page-header\"><div><div class=\"page-title\">Validation summary<\u002Fdiv><div class=\"page-sub\">What the AI found across your documents, and how confident it is — before you review each category in detail.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"reviewtop\">\n    ${kpis.map(k=>`<div class=\"rt-card\"><div class=\"n\">${k.n}<\u002Fdiv><div class=\"l\">${k.l}<\u002Fdiv><\u002Fdiv>`).join('')}\n  <\u002Fdiv>\n  <div class=\"readymeter\">\n    <div class=\"rm-top\"><span style=\"font-weight:600;font-size:13.5px;\">Data quality — ready for review<\u002Fspan><span style=\"font-family:var(--mono);font-weight:600;color:var(--emerald);\">${pct}%<\u002Fspan><\u002Fdiv>\n    <div class=\"rm-bar\"><div class=\"rm-fill\" style=\"width:${pct}%;\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;color:var(--text-2);margin-top:8px;\">${high} of ${totalRecords} records extracted cleanly. The rest are flagged for a quick look — nothing here blocks you from reviewing.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;gap:16px;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);align-items:start;\">\n    <div class=\"card\">\n      <div class=\"card-hd\"><h3>Validation results<\u002Fh3><\u002Fdiv>\n      <div class=\"card-pad\" style=\"padding-top:16px;\">\n        <div class=\"valresults\">\n          <div class=\"valrow ok\">${icon('check-circle',15)}<span><b>${high} records<\u002Fb> extracted with high confidence and matched to ManaGem fields.<\u002Fspan><\u002Fdiv>\n          <div class=\"valrow warn\">${icon('alert',15)}<span><b>${med} records<\u002Fb> need a quick review — a field was missing or formatted unusually in the source.<\u002Fspan><\u002Fdiv>\n          <div class=\"valrow dupe\">${icon('info',15)}<span><b>${dupe} possible duplicates<\u002Fb> matched to records already in ManaGem — you’ll choose whether to merge.<\u002Fspan><\u002Fdiv>\n          <div class=\"valrow crit\">${icon('alert',15)}<span><b>${low} low-confidence records<\u002Fb> — only partial data could be read from the source document.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"card-hd\"><h3>AI confidence<\u002Fh3><\u002Fdiv>\n      <div class=\"card-pad\" style=\"padding-top:16px;\">\n        <div class=\"confbars\">\n          <div class=\"confbar\"><div class=\"cb-top\"><span>High confidence<\u002Fspan><b>${hiPct}%<\u002Fb><\u002Fdiv><div class=\"cb-track\"><div class=\"cb-fill\" style=\"width:${hiPct}%;background:var(--emerald);\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"confbar\"><div class=\"cb-top\"><span>Medium confidence<\u002Fspan><b>${medPct}%<\u002Fb><\u002Fdiv><div class=\"cb-track\"><div class=\"cb-fill\" style=\"width:${medPct}%;background:var(--amber);\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"confbar\"><div class=\"cb-top\"><span>Low confidence<\u002Fspan><b>${loPct}%<\u002Fb><\u002Fdiv><div class=\"cb-track\"><div class=\"cb-fill\" style=\"width:${loPct}%;background:var(--red);\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--text-2);margin-top:14px;line-height:1.6;\">Confidence reflects how cleanly each field could be read and matched. You’ll see a per-record score on every item in the next steps.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction reviewMeta(key){\n  const map = {customers:{data:CUSTOMERS,label:'customers',title:'Review customers'},\n    products:{data:PRODUCTS,label:'products',title:'Review products & pricing'},\n    staff:{data:STAFF,label:'staff',title:'Review staff records'}};\n  return map[key];\n}\n\nfunction customerCols(r){\n  return `<td class=\"cell-bold full\">${r.name}<\u002Ftd><td><span class=\"badge badge-${r.type==='Credit'?'sky':'slate'}\" style=\"text-transform:none;\">${r.type}<\u002Fspan><\u002Ftd>\n  <td>${r.contact}<\u002Ftd><td class=\"cell-mono\">${r.phone}<\u002Ftd><td>${r.email}<\u002Ftd>`;\n}\nfunction customerHead(){ return `<th>Customer<\u002Fth><th>Type<\u002Fth><th>Contact<\u002Fth><th>Phone<\u002Fth><th>Email<\u002Fth>`; }\n\nfunction productCols(r){\n  return `<td class=\"cell-mono\">${r.code}<\u002Ftd><td class=\"cell-bold full\">${r.desc}<\u002Ftd><td>${r.cat}<\u002Ftd><td>R ${r.price.toLocaleString()}<\u002Ftd><td>${r.unit}<\u002Ftd><td>${r.tax}<\u002Ftd>`;\n}\nfunction productHead(){ return `<th>Code<\u002Fth><th>Description<\u002Fth><th>Category<\u002Fth><th>Price<\u002Fth><th>Unit<\u002Fth><th>Tax<\u002Fth>`; }\n\nfunction staffCols(r){\n  return `<td class=\"cell-bold full\">${r.name}<\u002Ftd><td>${r.role}<\u002Ftd><td>${r.dept}<\u002Ftd><td>${r.type}<\u002Ftd><td class=\"cell-mono\">${r.phone}<\u002Ftd>`;\n}\nfunction staffHead(){ return `<th>Name<\u002Fth><th>Role<\u002Fth><th>Department<\u002Fth><th>Type<\u002Fth><th>Phone<\u002Fth>`; }\n\nfunction screenReview(key){\n  const meta = reviewMeta(key);\n  const data = meta.data;\n  const headFn = {customers:customerHead, products:productHead, staff:staffHead}[key];\n  const colFn = {customers:customerCols, products:productCols, staff:staffCols}[key];\n  const high = data.filter(r=>r.conf==='high').length;\n  const manual = data.filter(r=>r.conf==='manual').length;\n  const review = data.filter(r=>r.conf==='medium'||r.conf==='low').length;\n  const dupe = data.filter(r=>r.conf==='dupe').length;\n  const filt = state.filter[key];\n  const filtered = data.filter((r,i)=>{\n    if(filt==='all') return true;\n    if(filt==='review') return r.conf==='medium'||r.conf==='low';\n    if(filt==='verified') return r.conf==='high'||r.conf==='manual';\n    return r.conf===filt;\n  });\n  return `\n  <div class=\"page-header\"><div><div class=\"page-title\">${meta.title}<\u002Fdiv><div class=\"page-sub\">${data.length} records found${manual?` — ${manual} entered manually by you`:''}<\u002Fdiv><\u002Fdiv>\n    <button class=\"btn btn-secondary btn-sm\" data-openlog=\"${key}\">${icon('info',13)} How was this extracted?<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"reviewtop\">\n    <div class=\"rt-card good\"><div class=\"n\">${high+manual}<\u002Fdiv><div class=\"l\">Verified ${manual?'(auto + manually entered)':'(high confidence)'}<\u002Fdiv><\u002Fdiv>\n    <div class=\"rt-card warn\"><div class=\"n\">${review}<\u002Fdiv><div class=\"l\">Needs your review<\u002Fdiv><\u002Fdiv>\n    <div class=\"rt-card bad\"><div class=\"n\">${dupe}<\u002Fdiv><div class=\"l\">Possible duplicates<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"toolbar\">\n    <span class=\"chip ${filt==='all'?'active':''}\" data-filter=\"${key}:all\">All (${data.length})<\u002Fspan>\n    <span class=\"chip ${filt==='review'?'active':''}\" data-filter=\"${key}:review\">Needs review (${review})<\u002Fspan>\n    <span class=\"chip ${filt==='dupe'?'active':''}\" data-filter=\"${key}:dupe\">Duplicates (${dupe})<\u002Fspan>\n    <span class=\"chip ${filt==='verified'?'active':''}\" data-filter=\"${key}:verified\">Verified (${high+manual})<\u002Fspan>\n    <div class=\"toolbar-right\">\n      <button class=\"btn btn-secondary btn-sm\" data-acceptall=\"${key}\">${icon('check',13)} Accept all verified<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"table-wrap\"><div class=\"table-scroll\">\n    <table class=\"data\">\n      <thead><tr>${headFn()}<th>Status<\u002Fth><th style=\"width:36px;\"><\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        ${filtered.map((r,i)=>`\n          <tr data-openrow=\"${key}:${data.indexOf(r)}\">\n            ${colFn(r)}\n            <td>${confBadge(r.conf, r.issue)}<\u002Ftd>\n            <td>${icon('chevron',15,'#94A3B8')}<\u002Ftd>\n          <\u002Ftr>`).join('')}\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction screenSummary(){\n  const cats = [\n    {id:'customers', tt:'Customers', ic:'users', data:CUSTOMERS},\n    {id:'products', tt:'Products & pricing', ic:'package', data:PRODUCTS},\n    {id:'staff', tt:'Staff records', ic:'users', data:STAFF},\n  ];\n  const totalIssues = cats.reduce((a,c)=>a+c.data.filter(r=>r.conf!=='high'&&r.conf!=='manual').length,0);\n  const totalRecords = cats.reduce((a,c)=>a+c.data.length,0);\n  const readyPct = Math.round(((totalRecords-totalIssues)/totalRecords)*100);\n  const critIssues = [];\n  cats.forEach(c=>c.data.forEach(r=>{ if(r.conf==='low') critIssues.push({cat:c.tt, name:r.name||r.desc, issue:r.issue}); }));\n  const dupeIssues = [];\n  cats.forEach(c=>c.data.forEach(r=>{ if(r.conf==='dupe') dupeIssues.push({cat:c.tt, name:r.name||r.desc, issue:r.issue}); }));\n\n  return `\n  <div class=\"page-header\"><div><div class=\"page-title\">Final confirmation<\u002Fdiv><div class=\"page-sub\">Review overall readiness and compliance, then confirm to send this to GEMIS for final sign-off.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"readymeter\">\n    <div class=\"rm-top\"><span style=\"font-weight:600;font-size:13.5px;\">Onboarding readiness<\u002Fspan><span style=\"font-family:var(--mono);font-weight:600;color:${readyPct>85?'var(--emerald)':'var(--amber)'};\">${readyPct}%<\u002Fspan><\u002Fdiv>\n    <div class=\"rm-bar\"><div class=\"rm-fill\" style=\"width:${readyPct}%;\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;color:var(--text-2);margin-top:8px;\">${totalRecords-totalIssues} of ${totalRecords} records fully verified. ${totalIssues} still need attention before submitting — you can still submit with medium-confidence items, GEMIS will confirm those.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"summarygrid\">\n    ${cats.map(c=>{\n      const hi = c.data.filter(r=>r.conf==='high'||r.conf==='manual').length;\n      const nd = c.data.filter(r=>r.conf!=='high'&&r.conf!=='manual').length;\n      return `<div class=\"sumcard\">\n        <div class=\"hd\"><div class=\"ic\">${icon(c.ic,16)}<\u002Fdiv><div class=\"tt\">${c.tt}<\u002Fdiv><\u002Fdiv>\n        <div class=\"row\">Total records<b>${c.data.length}<\u002Fb><\u002Fdiv>\n        <div class=\"row\">Verified<b style=\"color:var(--emerald)\">${hi}<\u002Fb><\u002Fdiv>\n        <div class=\"row\">Needs attention<b style=\"color:var(--amber)\">${nd}<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>`;\n    }).join('')}\n  <\u002Fdiv>\n  ${critIssues.length?`\n  <div class=\"card card-pad\" style=\"margin-bottom:14px;\">\n    <h3 style=\"margin-bottom:12px;\">Blocking issues <span style=\"color:var(--text-2);font-weight:400;font-size:12px;\">— recommended to fix before submitting<\u002Fspan><\u002Fh3>\n    <div class=\"issuelist\">\n      ${critIssues.map(i=>`<div class=\"issue crit\">${icon('alert',14)} <span><b>${i.cat}:<\u002Fb> \"${i.name}\" — ${i.issue}<\u002Fspan><\u002Fdiv>`).join('')}\n      ${dupeIssues.map(i=>`<div class=\"issue\">${icon('info',14)} <span><b>${i.cat}:<\u002Fb> \"${i.name}\" — ${i.issue}<\u002Fspan><\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`:''}\n  <div class=\"card card-pad\">\n    <h3 style=\"margin-bottom:6px;\">What happens after you submit<\u002Fh3>\n    <p style=\"color:var(--text-2);font-size:12.5px;line-height:1.6;margin:0;\">Your confirmed data goes to a GEMIS onboarding specialist for a short spot-check — not a full re-capture — focused on anything flagged above. Once approved, your customers, products and staff are created directly in your ManaGem workspace and you'll get an email when it's ready.<\u002Fp>\n  <\u002Fdiv>\n\n  ${(function(){\n    const reviewCats=[{d:CUSTOMERS,n:'Customers'},{d:PRODUCTS,n:'Products'},{d:STAFF,n:'Staff'}];\n    const fullyReviewed = reviewCats.filter(c=>c.data? false : c.d.every(r=>r.conf==='high'||r.conf==='manual')).length;\n    const humanDone = fullyReviewed===reviewCats.length;\n    const rows = [\n      {label:'POPIA consent captured', done:state.consents.processing && state.consents.policies},\n      {label:'Documents encrypted', done:true},\n      {label:'Virus scanned', done:true},\n      {label:'AI processing complete', done:true},\n      {label:'Human verified', done:humanDone, pend:!humanDone, pendText:`${fullyReviewed} of ${reviewCats.length} categories fully reviewed`},\n      {label:'Audit trail recorded', done:state.auditLog.length>0},\n    ];\n    return `\n    <div class=\"card card-pad\" style=\"margin-top:14px;\">\n      <h3 style=\"margin-bottom:14px;\">Compliance status<\u002Fh3>\n      <div class=\"compgrid\">\n        ${rows.map(r=>`<div class=\"comprow\"><div class=\"ci ${r.done?'done':'pend'}\">${icon(r.done?'check':'alert',12)}<\u002Fdiv><div><div class=\"clabel\">${r.label}<\u002Fdiv>${r.pend?`<div style=\"font-size:11px;color:var(--amber);\">${r.pendText}<\u002Fdiv>`:''}<\u002Fdiv><\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card card-pad\" style=\"margin-top:14px;\">\n      <h3 style=\"margin-bottom:8px;\">Final legal declaration<\u002Fh3>\n      <!-- LEGAL COPY: placeholder, needs sign-off -->\n      <div class=\"finaldecl\">\n        <ul>\n          <li>The information I am submitting is accurate to the best of my knowledge.<\u002Fli>\n          <li>I have reviewed the records flagged for attention and accept them as submitted.<\u002Fli>\n          <li>I authorise GEMIS to create this data in our ManaGem workspace after its review.<\u002Fli>\n          <li>I understand medium-confidence items will be confirmed by GEMIS during sign-off.<\u002Fli>\n        <\u002Ful>\n        <label class=\"finalcheck\"><input type=\"checkbox\" id=\"finalApproval\" ${state.finalApproval?'checked':''}><span class=\"ftext\"><b>I confirm the above<\u002Fb> and authorise this submission for GEMIS review.<\u002Fspan><\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  })()}\n  `;\n}\n\nfunction refNumber(){\n  if(!state.submittedRef){\n    const d = new Date();\n    const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;\n    state.submittedRef = `ONB-${ds}-${Math.floor(1000+Math.random()*9000)}`;\n  }\n  return state.submittedRef;\n}\nfunction screenSuccess(){\n  const ref = refNumber();\n  const submitted = new Date().toLocaleString([], {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});\n  return `\n  <div class=\"success-wrap\">\n    <div class=\"success-ic\">${icon('check-circle',30)}<\u002Fdiv>\n    <h1 style=\"font-size:24px;font-weight:600;\">Submitted for GEMIS review<\u002Fh1>\n    <p style=\"color:var(--text-2);font-size:13.5px;line-height:1.6;\">Thanks — your data has been packaged and sent to a GEMIS onboarding specialist. Most reviews are completed within one business day. We'll email admin@sbswaterproofing.co.za the moment your ManaGem workspace is ready.<\u002Fp>\n    <div style=\"display:inline-flex;flex-direction:column;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:11px;padding:14px 20px;margin:20px auto 0;text-align:left;min-width:300px;\">\n      <div style=\"display:flex;justify-content:space-between;gap:24px;font-size:12.5px;\"><span style=\"color:var(--text-2);\">Reference<\u002Fspan><b class=\"mono\">${ref}<\u002Fb><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;gap:24px;font-size:12.5px;\"><span style=\"color:var(--text-2);\">Submitted by<\u002Fspan><b>admin@sbswaterproofing.co.za<\u002Fb><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;gap:24px;font-size:12.5px;\"><span style=\"color:var(--text-2);\">Submitted<\u002Fspan><b>${submitted}<\u002Fb><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;gap:24px;font-size:12.5px;\"><span style=\"color:var(--text-2);\">Estimated review<\u002Fspan><b>Within 1 business day<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"success-stats\">\n      <div class=\"sstat\"><div class=\"n\">${CUSTOMERS.length}<\u002Fdiv><div class=\"l\">Customers<\u002Fdiv><\u002Fdiv>\n      <div class=\"sstat\"><div class=\"n\">${PRODUCTS.length}<\u002Fdiv><div class=\"l\">Products<\u002Fdiv><\u002Fdiv>\n      <div class=\"sstat\"><div class=\"n\">${STAFF.length}<\u002Fdiv><div class=\"l\">Staff<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap;\">\n      <button class=\"btn btn-secondary\" id=\"btnRestart\">Start another company<\u002Fbutton>\n      <button class=\"btn btn-secondary\" id=\"btnReport\">${icon('download',14)} Download submission report<\u002Fbutton>\n      <button class=\"btn btn-primary\">${icon('link',14)} Track review status<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction screenReport(){\n  const ref = refNumber();\n  const now = new Date().toLocaleString([], {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});\n  const reviewCats=[{d:CUSTOMERS,n:'Customers'},{d:PRODUCTS,n:'Products'},{d:STAFF,n:'Staff'}];\n  const fullyReviewed = reviewCats.filter(c=>c.d.every(r=>r.conf==='high'||r.conf==='manual')).length;\n  const comp = [\n    {label:'POPIA consent captured', done:state.consents.processing && state.consents.policies},\n    {label:'Documents encrypted', done:true},\n    {label:'Virus scanned', done:true},\n    {label:'AI processing complete', done:true},\n    {label:'Human verified', done:fullyReviewed===reviewCats.length, note:fullyReviewed===reviewCats.length?'':`${fullyReviewed}/${reviewCats.length} categories`},\n    {label:'Audit trail recorded', done:state.auditLog.length>0, note:`${state.auditLog.length} events`},\n  ];\n  const docCount = Object.values(state.uploads).reduce((a,f)=>a+f.length,0) || 4;\n  return `\n  <div style=\"max-width:800px;margin:0 auto 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;\">\n    <button class=\"btn btn-ghost\" id=\"reportBack\">${icon('arrowright',14).replace('12 5 19 12 12 19','19 12 5 12').replace('5\" y1=\"12\" x2=\"19','19\" y1=\"12\" x2=\"5')} Back<\u002Fbutton>\n    <button class=\"btn btn-secondary\" onclick=\"window.print()\">${icon('download',14)} Print / save as PDF<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"report-sheet\">\n    <div class=\"report-hd\">\n      <div><div class=\"rt\">Onboarding submission report<\u002Fdiv><div class=\"rs\">ManaGem Take-On — SBS Waterproofing (Pty) Ltd<\u002Fdiv><\u002Fdiv>\n      <div class=\"rref\">${ref}<br><span style=\"color:#64748B;\">${now}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"report-body\">\n      <div class=\"report-section\">\n        <h4>Submission details<\u002Fh4>\n        <div class=\"report-kv\">\n          <div class=\"kv\"><span>Company<\u002Fspan><b>SBS Waterproofing (Pty) Ltd<\u002Fb><\u002Fdiv>\n          <div class=\"kv\"><span>Registration<\u002Fspan><b>2014/123456/07<\u002Fb><\u002Fdiv>\n          <div class=\"kv\"><span>Submitted by<\u002Fspan><b>admin@sbswaterproofing.co.za<\u002Fb><\u002Fdiv>\n          <div class=\"kv\"><span>Documents processed<\u002Fspan><b>${docCount}<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"report-section\">\n        <h4>Records submitted<\u002Fh4>\n        <div class=\"report-kv\">\n          <div class=\"kv\"><span>Customers<\u002Fspan><b>${CUSTOMERS.length}<\u002Fb><\u002Fdiv>\n          <div class=\"kv\"><span>Products<\u002Fspan><b>${PRODUCTS.length}<\u002Fb><\u002Fdiv>\n          <div class=\"kv\"><span>Staff<\u002Fspan><b>${STAFF.length}<\u002Fb><\u002Fdiv>\n          <div class=\"kv\"><span>Total records<\u002Fspan><b>${CUSTOMERS.length+PRODUCTS.length+STAFF.length}<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"report-section\">\n        <h4>Compliance checklist<\u002Fh4>\n        <div class=\"compgrid\">\n          ${comp.map(r=>`<div class=\"comprow\"><div class=\"ci ${r.done?'done':'pend'}\">${icon(r.done?'check':'alert',12)}<\u002Fdiv><div><div class=\"clabel\">${r.label}<\u002Fdiv>${r.note?`<div style=\"font-size:11px;color:var(--text-3);\">${r.note}<\u002Fdiv>`:''}<\u002Fdiv><\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"report-section\" style=\"margin-bottom:0;\">\n        <h4>Audit trail (${state.auditLog.length} events)<\u002Fh4>\n        <div style=\"border:1px solid var(--border);border-radius:9px;overflow:hidden;\">\n          ${(state.auditLog.length?state.auditLog:[{time:'—',event:'No audit entries recorded in this session'}]).map((a,i)=>`<div style=\"display:flex;gap:12px;padding:8px 12px;font-size:12px;${i%2?'background:var(--slate-50);':''}\"><span class=\"mono\" style=\"color:var(--text-3);min-width:70px;\">${a.time}<\u002Fspan><span style=\"font-weight:500;\">${a.event}<\u002Fspan>${a.detail?`<span style=\"color:var(--text-2);margin-left:auto;\">${a.detail}<\u002Fspan>`:''}<\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ---------- Admin queue ---------- */\nfunction renderAdminQueue(){\n  return `\n  <div class=\"page-header\"><div><div class=\"page-title\">Take-on queue<\u002Fdiv><div class=\"page-sub\">Companies currently onboarding onto ManaGem<\u002Fdiv><\u002Fdiv>\n    <button class=\"btn btn-secondary btn-sm\">${icon('search',13)} Search companies<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"reviewtop\">\n    <div class=\"rt-card\"><div class=\"n\">${ADMIN_QUEUE.length}<\u002Fdiv><div class=\"l\">In progress<\u002Fdiv><\u002Fdiv>\n    <div class=\"rt-card warn\"><div class=\"n\">${ADMIN_QUEUE.filter(q=>q.status.includes('QA')).length}<\u002Fdiv><div class=\"l\">Awaiting your sign-off<\u002Fdiv><\u002Fdiv>\n    <div class=\"rt-card good\"><div class=\"n\">${ADMIN_QUEUE.filter(q=>q.stage===6).length}<\u002Fdiv><div class=\"l\">Synced this week<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"table-wrap\"><div class=\"table-scroll\">\n    <table class=\"data\">\n      <thead><tr><th>Company<\u002Fth><th>Progress<\u002Fth><th>Status<\u002Fth><th>Compliance<\u002Fth><th>Risk<\u002Fth><th>Est. review<\u002Fth><th>Flagged<\u002Fth><th style=\"width:100px;\"><\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        ${ADMIN_QUEUE.map(q=>{\n          const riskVariant = q.riskLevel==='Low'?'emerald':q.riskLevel==='Medium'?'amber':'red';\n          const compVariant = q.complianceScore===100?'emerald':'amber';\n          return `\n        <tr>\n          <td class=\"cell-bold full\">${q.name}<\u002Ftd>\n          <td><div class=\"qstatus\"><div class=\"bar\">${[1,2,3,4,5,6].map(n=>`<div class=\"seg ${n<=q.stage?'on':''}\"><\u002Fdiv>`).join('')}<\u002Fdiv><\u002Fdiv><\u002Ftd>\n          <td>${q.status}<\u002Ftd>\n          <td><span class=\"badge badge-${compVariant}\">${icon('shield-check',10)} ${q.complianceScore}%<\u002Fspan><\u002Ftd>\n          <td><span class=\"badge badge-${riskVariant}\">${q.riskLevel}<\u002Fspan><\u002Ftd>\n          <td class=\"cell-mono\" style=\"color:var(--text-2);\">${q.reviewDuration}<\u002Ftd>\n          <td>${q.flagged?`<span class=\"badge badge-amber\">${icon('alert',10)} ${q.flagged}<\u002Fspan>`:(q.stage>=6?'<span class=\"badge badge-emerald\">'+icon('check',10)+' None<\u002Fspan>':'—')}<\u002Ftd>\n          <td>${q.status.includes('QA')?'<button class=\"btn btn-accent btn-sm\">Review<\u002Fbutton>':'<button class=\"btn btn-secondary btn-sm\">View<\u002Fbutton>'}<\u002Ftd>\n        <\u002Ftr>`;}).join('')}\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"card card-pad\" style=\"margin-top:16px;\">\n    <h3 style=\"margin-bottom:6px;\">Why this matters for GEMIS<\u002Fh3>\n    <p style=\"color:var(--text-2);font-size:12.5px;line-height:1.6;margin:0;\">Every company in this queue has already had their data extracted and self-corrected before it reaches you. Your job shifts from re-typing customer lists and price sheets to a five-minute spot-check on whatever the client's own AI review flagged — mostly duplicates and low-confidence fields.<\u002Fp>\n  <\u002Fdiv>`;\n}\n\n/* ---------- Drawer (record detail) ---------- */\nfunction renderDrawer(){\n  const d = state.drawer;\n  if(!d) return `<div class=\"drawer-bg\"><\u002Fdiv><div class=\"drawer\"><\u002Fdiv>`;\n  const meta = reviewMeta(d.key);\n  const r = meta.data[d.idx];\n  const nameField = r.name || r.desc;\n  const isManual = r.conf==='manual';\n  return `\n  <div class=\"drawer-bg open\" id=\"drawerBg\"><\u002Fdiv>\n  <div class=\"drawer open\">\n    <div class=\"drawer-hd\"><h3>${isManual?'Edit record':'Review record'}<\u002Fh3><button class=\"closebtn\" id=\"drawerClose\">${icon('x',17)}<\u002Fbutton><\u002Fdiv>\n    <div class=\"drawer-bd\">\n      ${r.conf==='dupe'?`\n        <div class=\"dupe-banner\" style=\"flex-direction:column;gap:8px;\">\n          <div style=\"display:flex;gap:10px;align-items:flex-start;\">${icon('info',16)}<div><b>Duplicate analysis<\u002Fb>${r.issue}<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;padding-left:26px;\">\n            <span>Similarity: <b class=\"mono\">${r.confidencePct||88}%<\u002Fb><\u002Fspan>\n            <span>Matched to: <b>${(r.name||r.desc||'existing record').replace(/ (CC|\\(Pty\\) Ltd)$/,'')}<\u002Fb> (in ManaGem)<\u002Fspan>\n          <\u002Fdiv>\n          <ul style=\"margin:2px 0 0;padding-left:26px;font-size:11.5px;line-height:1.6;\">\n            <li>Name is a close match to an existing record<\u002Fli>\n            <li>Same account type and contact region<\u002Fli>\n            <li>Added within the last few weeks<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>`:''}\n      ${isManual ? `\n        <div class=\"srcpanel\"><div class=\"lbl\">${icon('edit',12)} You entered this manually<\u002Fdiv>No source document — this record is already confirmed. Feel free to refine any field below.<\u002Fdiv>\n      ` : `\n        <div class=\"srcpanel\">\n          <div class=\"lbl\">${icon('file',12)} Source document<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;\">\n            <span style=\"font-weight:600;color:var(--text);\">${r.src}<\u002Fspan>\n            <span class=\"badge badge-${r.confidencePct>=90?'emerald':r.confidencePct>=70?'amber':'red'}\" style=\"font-weight:600;\">${r.confidencePct}% confidence<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--text-3);margin-bottom:10px;\">${r.sourceType==='xlsx'?`Row ${r.row}`:`Page ${r.page}`} · ${r.sourceType==='xlsx'?'Spreadsheet':'PDF document'}<\u002Fdiv>\n          <div class=\"lbl\" style=\"margin-bottom:6px;\">Original extracted text<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:11.5px;color:var(--slate-600);line-height:1.5;\">“…${r.name||r.desc} <span class=\"hl\">${r.contact||r.role||r.cat||''}<\u002Fspan> ${r.phone&&r.phone!=='\\u2014'?r.phone:''} ${r.email&&r.email!=='\\u2014'?r.email:''}…”<\u002Fdiv>\n        <\u002Fdiv>\n        ${(r.reasoning&&r.reasoning.length)?`\n        <div style=\"margin-bottom:18px;\">\n          <div class=\"lbl\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;\">${icon('sparkle',12,'#0EA5E9')} AI reasoning<\u002Fdiv>\n          ${r.reasoning.map(x=>`<div class=\"checkline\" style=\"gap:8px;margin-bottom:6px;\"><span style=\"color:var(--emerald);flex-shrink:0;margin-top:1px;\">${icon('check',13)}<\u002Fspan><span style=\"font-size:12px;color:var(--slate-600);line-height:1.5;\">${x}<\u002Fspan><\u002Fdiv>`).join('')}\n        <\u002Fdiv>` : ''}\n      `}\n      ${r.issue&&r.conf!=='dupe'?`<div class=\"issue\" style=\"margin-bottom:16px;\">${icon('alert',13)} ${r.issue}<\u002Fdiv>`:''}\n      ${renderDrawerFields(d.key, r)}\n    <\u002Fdiv>\n    <div class=\"drawer-ft\">\n      ${r.conf==='dupe'?`<button class=\"btn btn-ghost\" id=\"drawerReject\">Discard<\u002Fbutton><button class=\"btn btn-secondary\" id=\"drawerAccept\">Keep both<\u002Fbutton><button class=\"btn btn-primary\" id=\"drawerAccept2\">Merge with existing<\u002Fbutton>`:\n      isManual ? `<button class=\"btn btn-primary\" id=\"drawerAccept\">${icon('check',14)} Save changes<\u002Fbutton>` :\n      `<button class=\"btn btn-secondary\" id=\"drawerReject\">Reject record<\u002Fbutton><button class=\"btn btn-primary\" id=\"drawerAccept\">${icon('check',14)} Confirm & continue<\u002Fbutton>`}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction renderDrawerFields(key, r){\n  if(key==='customers') return `\n    <div class=\"field\"><label>Customer name<\u002Flabel><input value=\"${r.name}\"><\u002Fdiv>\n    <div class=\"field\"><label>Account type<\u002Flabel><select><option ${r.type==='Credit'?'selected':''}>Credit<\u002Foption><option ${r.type==='Cash'?'selected':''}>Cash<\u002Foption><option>Pre-Pay<\u002Foption><\u002Fselect><\u002Fdiv>\n    <div class=\"field\"><label>Primary contact<\u002Flabel><input value=\"${r.contact==='—'?'':r.contact}\" placeholder=\"Not found in source\"><\u002Fdiv>\n    <div class=\"field\"><label>Phone<\u002Flabel><input value=\"${r.phone==='—'?'':r.phone}\" placeholder=\"Not found in source\"><\u002Fdiv>\n    <div class=\"field\"><label>Email<\u002Flabel><input value=\"${r.email==='—'?'':r.email}\" placeholder=\"Not found in source\"><\u002Fdiv>`;\n  if(key==='products') return `\n    <div class=\"field\"><label>Product code<\u002Flabel><input value=\"${r.code==='—'?'':r.code}\" placeholder=\"Not found — will be auto-generated\"><\u002Fdiv>\n    <div class=\"field\"><label>Description<\u002Flabel><input value=\"${r.desc}\"><\u002Fdiv>\n    <div class=\"field\"><label>Category<\u002Flabel><input value=\"${r.cat}\"><\u002Fdiv>\n    <div class=\"field\"><label>Selling price (excl. VAT)<\u002Flabel><input value=\"R ${r.price}\"><\u002Fdiv>\n    <div class=\"field\"><label>Unit<\u002Flabel><input value=\"${r.unit}\"><\u002Fdiv>\n    <div class=\"field\"><label>Tax rate<\u002Flabel><select><option ${r.tax==='15%'?'selected':''}>15%<\u002Foption><option>0% (Zero-rated)<\u002Foption><option>Exempt<\u002Foption><\u002Fselect><\u002Fdiv>`;\n  return `\n    <div class=\"field\"><label>Full name<\u002Flabel><input value=\"${r.name}\"><\u002Fdiv>\n    <div class=\"field\"><label>Job title<\u002Flabel><input value=\"${r.role}\"><\u002Fdiv>\n    <div class=\"field\"><label>Department<\u002Flabel><input value=\"${r.dept}\"><\u002Fdiv>\n    <div class=\"field\"><label>Employment type<\u002Flabel><select><option ${r.type==='Permanent'?'selected':''}>Permanent<\u002Foption><option ${r.type==='Contractor'?'selected':''}>Contractor<\u002Foption><option>Fixed-term<\u002Foption><\u002Fselect><\u002Fdiv>\n    <div class=\"field\"><label>Phone<\u002Flabel><input value=\"${r.phone}\"><\u002Fdiv>\n    <div class=\"field\"><label>Email<\u002Flabel><input value=\"${r.email==='—'?'':r.email}\" placeholder=\"Not found in source\"><\u002Fdiv>`;\n}\n\n/* ---------- Policy drawer (lightweight viewer) ---------- */\nfunction renderPolicyDrawer(){\n  const p = state.policyDrawer;\n  if(!p) return '';\n  return `\n  <div class=\"drawer-bg open\" id=\"policyBg\"><\u002Fdiv>\n  <div class=\"drawer open\" style=\"width:460px;\">\n    <div class=\"drawer-hd\"><h3>${p}<\u002Fh3><button class=\"closebtn\" id=\"policyClose\">${icon('x',17)}<\u002Fbutton><\u002Fdiv>\n    <div class=\"drawer-bd\">\n      <!-- LEGAL COPY: placeholder, needs sign-off -->\n      <div class=\"badge badge-slate\" style=\"margin-bottom:14px;\">Placeholder — draft copy<\u002Fdiv>\n      <div class=\"agreement-prose\">\n        <p>This is a summary of the <b>${p}<\u002Fb> for the ManaGem Take-On onboarding process. The full, legally reviewed version will be provided by GEMIS before go-live.<\u002Fp>\n        <p>It covers what data is collected, the lawful basis for processing it under POPIA, how long it is retained, the security measures applied, and your rights to access, correct or delete your information.<\u002Fp>\n        <p>Data is processed only for onboarding onto ManaGem, is never sold, and is never used to train third-party models. You may withdraw consent or request deletion at any time by contacting your GEMIS onboarding specialist.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"drawer-ft\"><button class=\"btn btn-primary\" id=\"policyCloseBtn\">Close<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ---------------- EVENTS ---------------- */\nfunction attachEvents(){\n  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{ state.view=b.dataset.view; render(); });\n\n  const back = document.getElementById('btnBack');\n  if(back) back.onclick = ()=>{ if(back.disabled) return; const i=stepIndex(state.screen); goTo(STEPS[Math.max(0,i-1)].id); };\n  const next = document.getElementById('btnNext');\n  if(next) next.onclick = ()=>{ const i=stepIndex(state.screen); if(state.screen==='upload'){ startProcessing(); return; } goTo(STEPS[Math.min(STEPS.length-1,i+1)].id); };\n\n  document.querySelectorAll('[data-upload]').forEach(z=>z.onclick=()=>{\n    const cat = z.dataset.upload;\n    const names = {\n      customers:['Client_Ledger_2025.xlsx','Invoice_Batch_Mar.pdf'],\n      products:['Price_List_2026.pdf','Supplier_Catalog_Sika.pdf'],\n      staff:['Staff_Register.xlsx'],\n      suppliers:['Supplier_Contacts.xlsx'],\n      company:['CIPC_Registration.pdf','Logo.png']\n    }[cat];\n    const pick = names[state.uploads[cat].length % names.length];\n    if(!state.uploads[cat].find(f=>f.name===pick)){\n      const now = new Date();\n      const fileObj = {name:pick, size:(Math.round(Math.random()*900+80))+' KB', time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), secured:false};\n      state.uploads[cat].push(fileObj);\n      state.auditLog.push({time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}), event:'File uploaded', detail:pick});\n      // simulate securing (encryption + virus scan) shortly after landing, then reflect it\n      setTimeout(()=>{ fileObj.secured = true; if(state.screen==='upload' && state.view==='client') render(); }, 900);\n    }\n    render();\n  });\n  document.querySelectorAll('[data-rmfile]').forEach(b=>b.onclick=(e)=>{\n    e.stopPropagation();\n    const [cat,idx] = b.dataset.rmfile.split(':');\n    state.uploads[cat].splice(+idx,1);\n    render();\n  });\n\n  document.querySelectorAll('[data-togglemanual]').forEach(b=>b.onclick=()=>{\n    const cat = b.dataset.togglemanual;\n    state.manualMode[cat] = !state.manualMode[cat];\n    render();\n  });\n  document.querySelectorAll('[data-addmanual]').forEach(b=>b.onclick=()=>{\n    const cat = b.dataset.addmanual;\n    const fields = MANUAL_FIELDS[cat];\n    const row = {};\n    let hasAny = false;\n    fields.forEach(f=>{\n      const el = document.getElementById(`mf-${cat}-${f.key}`);\n      const v = el ? el.value.trim() : '';\n      row[f.key] = v;\n      if(v) hasAny = true;\n    });\n    if(!hasAny) return;\n    state.manual[cat].push(row);\n    render();\n  });\n  document.querySelectorAll('[data-rmmanual]').forEach(b=>b.onclick=(e)=>{\n    e.stopPropagation();\n    const [cat,idx] = b.dataset.rmmanual.split(':');\n    state.manual[cat].splice(+idx,1);\n    render();\n  });\n\n  document.querySelectorAll('[data-filter]').forEach(c=>c.onclick=()=>{\n    const [key,val] = c.dataset.filter.split(':');\n    state.filter[key]=val; render();\n  });\n  document.querySelectorAll('[data-openrow]').forEach(tr=>tr.onclick=()=>{\n    const [key,idx] = tr.dataset.openrow.split(':');\n    state.drawer = {key, idx:+idx}; render();\n  });\n  const dc = document.getElementById('drawerClose'); if(dc) dc.onclick=()=>{state.drawer=null; render();};\n  const dbg = document.getElementById('drawerBg'); if(dbg) dbg.onclick=()=>{state.drawer=null; render();};\n  const da = document.getElementById('drawerAccept'); if(da) da.onclick=()=>{state.drawer=null; render();};\n  const da2 = document.getElementById('drawerAccept2'); if(da2) da2.onclick=()=>{state.drawer=null; render();};\n  const dr = document.getElementById('drawerReject'); if(dr) dr.onclick=()=>{state.drawer=null; render();};\n\n  // consent checkboxes (Trust screen)\n  document.querySelectorAll('[data-consent]').forEach(cb=>cb.onchange=()=>{\n    state.consents[cb.dataset.consent] = cb.checked; render();\n  });\n  // policy links → lightweight policy viewer\n  document.querySelectorAll('[data-policy]').forEach(a=>a.onclick=()=>{ state.policyDrawer = a.dataset.policy; render(); });\n  const pc = document.getElementById('policyClose'); if(pc) pc.onclick=()=>{state.policyDrawer=null; render();};\n  const pcb = document.getElementById('policyCloseBtn'); if(pcb) pcb.onclick=()=>{state.policyDrawer=null; render();};\n  const pbg = document.getElementById('policyBg'); if(pbg) pbg.onclick=()=>{state.policyDrawer=null; render();};\n  // final legal declaration\n  const fa = document.getElementById('finalApproval'); if(fa) fa.onchange=()=>{ state.finalApproval = fa.checked; render(); };\n  // submission report\n  const rep = document.getElementById('btnReport'); if(rep) rep.onclick=()=>{ state.showReport=true; window.scrollTo({top:0,behavior:'smooth'}); render(); };\n  const repBack = document.getElementById('reportBack'); if(repBack) repBack.onclick=()=>{ state.showReport=false; render(); };\n\n  document.querySelectorAll('[data-acceptall]').forEach(b=>b.onclick=()=>{\n    b.textContent=''; b.innerHTML = icon('check',13)+' All verified records accepted';\n    b.disabled=true; b.style.opacity=.6;\n  });\n\n  const restart = document.getElementById('btnRestart');\n  if(restart) restart.onclick = ()=>{ state.screen='welcome'; state.uploads={company:[],customers:[],products:[],staff:[],suppliers:[]}; state.consents={authorised:false,processing:false,aiUnderstanding:false,reviewUnderstanding:false,policies:false}; state.finalApproval=false; state.auditLog=[]; state.showReport=false; state.submittedRef=null; state.sessionStart=Date.now(); render(); };\n}\n\nfunction goTo(id){ state.screen = id; window.scrollTo({top:0,behavior:'smooth'}); render(); }\n\nfunction startProcessing(){\n  state.screen = 'processing';\n\n  // Fold manually-entered rows into the working data sets as pre-confirmed records —\n  // they skip extraction entirely since the company typed them in directly.\n  const manualCounts = {customers:0, products:0, staff:0};\n  state.manual.customers.forEach(r=>{ if(r.name){ CUSTOMERS.unshift({...r, conf:'manual', src:'Entered manually by you'}); manualCounts.customers++; }});\n  state.manual.products.forEach(r=>{ if(r.desc){ PRODUCTS.unshift({code:r.code||'—', desc:r.desc, cat:r.cat||'Uncategorised', price:Number(r.price)||0, unit:r.unit||'ea', tax:r.tax||'15%', conf:'manual', src:'Entered manually by you'}); manualCounts.products++; }});\n  state.manual.staff.forEach(r=>{ if(r.name){ STAFF.unshift({...r, email:r.email||'—', conf:'manual', src:'Entered manually by you'}); manualCounts.staff++; }});\n  // clear so re-visiting upload doesn't re-add them if the user goes back and forward\n  state.manual = {customers:[], products:[], staff:[], suppliers:state.manual.suppliers};\n\n  render();\n  const targets = {customers: CUSTOMERS.length, products: PRODUCTS.length, staff: STAFF.length, flags: CUSTOMERS.concat(PRODUCTS,STAFF).filter(r=>r.conf!=='high'&&r.conf!=='manual').length};\n  const logs = [];\n  if(manualCounts.customers||manualCounts.products||manualCounts.staff){\n    logs.push('Adding your manually entered records — these need no extraction and are already confirmed');\n  }\n  if(state.uploads.customers.length){ logs.push('Reading <b>'+state.uploads.customers[0].name+'<\u002Fb>…'); logs.push('Detected customer records — matching to ManaGem fields'); }\n  if(state.uploads.products.length){ logs.push('Reading <b>'+state.uploads.products[0].name+'<\u002Fb>…'); logs.push('Extracting products, cross-checking tax rates'); }\n  if(state.uploads.staff.length){ logs.push('Reading <b>'+state.uploads.staff[0].name+'<\u002Fb>…'); logs.push('Detected staff records'); }\n  logs.push('Cross-referencing customers against ManaGem\\u2019s existing database');\n  logs.push('Flagged 1 possible duplicate customer — \"Mzansi Construct CC\"');\n  logs.push('Flagged 1 possible duplicate product — roof sheeting');\n  logs.push(`Ready — ${targets.customers+targets.products+targets.staff} records total for your review`);\n  let li=0;\n  const logEl = ()=>document.getElementById('proglog');\n  const pushLog = ()=>{\n    if(!logEl()) return;\n    if(li<logs.length){\n      const d = document.createElement('div');\n      d.className='logline';\n      d.innerHTML = `<span class=\"lic\">${icon('check',13)}<\u002Fspan><span>${logs[li]}<\u002Fspan>`;\n      logEl().appendChild(d);\n      logEl().scrollTop = logEl().scrollHeight;\n      li++;\n      setTimeout(pushLog, 480);\n    }\n  };\n  pushLog();\n\n  // Audit activity — same timed-append pattern, timestamps derived from sessionStart (never a hardcoded clock)\n  const auditEvents = [\n    'Upload received', 'Encryption verified', 'Virus scan complete', 'Document classification',\n    `Detected ${targets.customers} customers, ${targets.products} products, ${targets.staff} staff`,\n    'Confidence scoring complete', 'Validation complete'\n  ];\n  let ai = 0;\n  const fmtOffset = (secs)=>{ const d = new Date(state.sessionStart + secs*1000); return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); };\n  const auditEl = ()=>document.getElementById('auditpanel');\n  const pushAudit = ()=>{\n    if(!auditEl()) return;\n    if(ai<auditEvents.length){\n      const t = fmtOffset(6 + ai*3);\n      state.auditLog.push({time:t, event:auditEvents[ai]});\n      const d = document.createElement('div');\n      d.className='auditline';\n      d.innerHTML = `<span class=\"at\">${t}<\u002Fspan><span class=\"ae\">${auditEvents[ai]}<\u002Fspan>`;\n      auditEl().appendChild(d);\n      auditEl().scrollTop = auditEl().scrollHeight;\n      ai++;\n      setTimeout(pushAudit, 540);\n    }\n  };\n  pushAudit();\n  // counters start pre-filled with manually entered rows since those needed no scanning\n  let c=manualCounts.customers, p=manualCounts.products, s=manualCounts.staff, f=0;\n  const tick = ()=>{\n    if(!document.getElementById('cnt-customers')) return;\n    if(c<targets.customers) c++; if(p<targets.products) p++; if(s<targets.staff) s++;\n    if(c===targets.customers && p===targets.products && s===targets.staff && f<targets.flags) f++;\n    document.getElementById('cnt-customers').textContent=c;\n    document.getElementById('cnt-products').textContent=p;\n    document.getElementById('cnt-staff').textContent=s;\n    document.getElementById('cnt-flags').textContent=f;\n    if(c<targets.customers||p<targets.products||s<targets.staff||f<targets.flags) setTimeout(tick,140);\n    else setTimeout(()=>goTo('validation'), 900);\n  };\n  tick();\n}\n\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
