document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ac440334-e16c-4596-9ff7-89fefc60e91f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"18e7567b-a75c-43fc-adf5-14065fa962eb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ac440334-e16c-4596-9ff7-89fefc60e91f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"18e7567b-a75c-43fc-adf5-14065fa962eb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root{\n  --navy:#0F172A; --navy-mid:#1E293B;\n  --sky:#0EA5E9; --sky-light:#E0F2FE; --sky-50:#F0F9FF;\n  --emerald:#10B981; --emerald-light:#D1FAE5;\n  --canvas:#F8FAFC; --white:#FFFFFF; --border:#E2E8F0;\n  --text:#0F172A; --text-2:#64748B; --text-3:#94A3B8;\n  --slate-50:#F8FAFC; --slate-100:#F1F5F9; --slate-200:#E2E8F0; --slate-300:#CBD5E1;\n  --slate-400:#94A3B8; --slate-500:#64748B; --slate-600:#475569; --slate-700:#334155;\n  --amber:#F59E0B; --amber-light:#FEF3C7;\n  --red:#EF4444; --red-light:#FEE2E2;\n  --purple:#8B5CF6; --purple-light:#EDE9FE;\n  --shadow-sm:0 1px 2px rgba(15,23,42,.04); --shadow-md:0 4px 12px rgba(15,23,42,.06); --shadow-lg:0 12px 32px rgba(15,23,42,.12);\n  --mono:\"JetBrains Mono\",ui-monospace,SFMono-Regular,Menlo,monospace;\n}\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;font-family:\"Outfit\",system-ui,sans-serif;font-size:13.5px;color:var(--text);background:var(--canvas);-webkit-font-smoothing:antialiased;}\nbutton{font-family:inherit;cursor:pointer;border:none;background:none;}\ninput,select,textarea{font-family:inherit;font-size:13px;color:var(--text);}\n.mono{font-family:var(--mono);}\nh1,h2,h3,h4{margin:0;}\n\n/* ===== APP FRAME ===== */\n.frame{min-height:100vh;display:flex;flex-direction:column;}\n\n/* ---- top brand bar ---- */\n.topbrand{background:var(--navy);color:#CBD5E1;padding:0 28px;display:flex;align-items:center;height:56px;flex-shrink:0;position:sticky;top:0;z-index:50;}\n.topbrand .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--sky),#6366F1);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;margin-right:10px;}\n.topbrand .title{font-weight:600;font-size:14px;color:#fff;}\n.topbrand .sub{font-size:11px;color:#64748B;margin-left:8px;padding-left:8px;border-left:1px solid #334155;}\n.topbrand .spacer{flex:1;}\n.topbrand .pill{font-size:11px;padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#E2E8F0;display:flex;align-items:center;gap:6px;}\n.topbrand .dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);}\n.viewswitch{display:flex;gap:0;margin-left:16px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px;}\n.viewswitch button{font-size:11.5px;padding:6px 12px;border-radius:6px;color:#94A3B8;font-weight:500;}\n.viewswitch button.active{background:var(--sky);color:#fff;}\n\n/* ---- stepper ---- */\n.stepperbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;overflow-x:auto;}\n.stepper{display:flex;gap:0;max-width:1180px;margin:0 auto;height:64px;align-items:center;}\n.step{display:flex;align-items:center;gap:9px;padding:8px 16px 8px 0;flex-shrink:0;opacity:.45;transition:opacity .2s;}\n.step.active,.step.done{opacity:1;}\n.step .num{width:24px;height:24px;border-radius:50%;background:var(--slate-200);color:var(--slate-600);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.step.active .num{background:var(--sky);color:#fff;}\n.step.done .num{background:var(--emerald);color:#fff;}\n.step .label{font-size:12.5px;font-weight:500;color:var(--slate-600);white-space:nowrap;}\n.step.active .label{color:var(--text);font-weight:600;}\n.step .connector{width:28px;height:1px;background:var(--slate-200);margin:0 4px;flex-shrink:0;}\n\n/* ---- main ---- */\n.main{flex:1;display:flex;justify-content:center;padding:32px 24px 80px;}\n.wrap{width:100%;max-width:1180px;}\n.screen{display:none;animation:fadein .25s ease;}\n.screen.active{display:block;}\n@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}\n\n.hero{text-align:center;padding:40px 20px 8px;}\n.hero h1{font-size:30px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px;}\n.hero p{color:var(--text-2);font-size:14.5px;max-width:560px;margin:0 auto;line-height:1.6;}\n\n.card{background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm);}\n.card-pad{padding:24px;}\n.card-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}\n.card-hd h3{font-size:14.5px;font-weight:600;}\n.card-hd .sub{font-size:12px;color:var(--text-2);margin-top:2px;}\n\n.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}\n.page-title{font-size:22px;font-weight:600;letter-spacing:-.01em;}\n.page-sub{color:var(--text-2);font-size:13px;margin-top:4px;}\n\n.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap;}\n.btn-primary{background:var(--navy);color:#fff;}\n.btn-primary:hover{background:#1E293B;}\n.btn-accent{background:var(--sky);color:#fff;}\n.btn-accent:hover{background:#0c93cf;}\n.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border);}\n.btn-secondary:hover{background:var(--slate-50);}\n.btn-ghost{background:transparent;color:var(--slate-600);}\n.btn-ghost:hover{background:var(--slate-100);}\n.btn:disabled{opacity:.4;cursor:not-allowed;}\n.btn-sm{padding:6px 12px;font-size:12px;}\n\n.footer-nav{max-width:1180px;margin:28px auto 0;display:flex;justify-content:space-between;align-items:center;padding:0 4px;}\n\n/* badges */\n.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em;}\n.badge-emerald{background:var(--emerald-light);color:#047857;}\n.badge-amber{background:var(--amber-light);color:#92400E;}\n.badge-red{background:var(--red-light);color:#B91C1C;}\n.badge-purple{background:var(--purple-light);color:#6D28D9;}\n.badge-sky{background:var(--sky-light);color:#0369A1;}\n.badge-slate{background:var(--slate-100);color:var(--slate-600);}\n.badge-dot::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}\n\n/* ===== SCREEN 1: welcome ===== */\n.startcard{max-width:640px;margin:0 auto;}\n.checklist{display:flex;flex-direction:column;gap:14px;margin:28px 0;}\n.checkline{display:flex;gap:12px;align-items:flex-start;}\n.checkline .ic{width:30px;height:30px;border-radius:9px;background:var(--sky-50);color:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.checkline .tt{font-weight:600;font-size:13.5px;}\n.checkline .dd{color:var(--text-2);font-size:12.5px;margin-top:2px;line-height:1.5;}\n.timeest{display:flex;align-items:center;gap:8px;justify-content:center;color:var(--text-2);font-size:12.5px;background:var(--slate-50);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-top:8px;}\n\n/* ===== company profile ===== */\n.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}\n.field label{font-size:12px;font-weight:600;color:var(--slate-700);}\n.field .hint{font-size:11px;color:var(--text-3);font-weight:400;}\n.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;outline:none;transition:.15s;}\n.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-light);}\n.logodrop{width:88px;height:88px;border-radius:12px;border:1.5px dashed var(--slate-300);display:flex;align-items:center;justify-content:center;color:var(--slate-400);flex-shrink:0;font-size:10.5px;text-align:center;cursor:pointer;background:var(--slate-50);}\n\n/* ===== upload hub ===== */\n.uploadgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n@media(max-width:820px){.uploadgrid{grid-template-columns:1fr;}}\n.dropzone{border:1.5px dashed var(--slate-300);border-radius:12px;padding:18px;background:var(--white);transition:.15s;}\n.dropzone.hasfiles{border-style:solid;border-color:var(--slate-200);}\n.dz-hd{display:flex;align-items:center;gap:10px;margin-bottom:4px;}\n.dz-icon{width:34px;height:34px;border-radius:9px;background:var(--sky-50);color:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.dz-hd .tt{font-weight:600;font-size:13.5px;}\n.dz-hd .req{font-size:10.5px;color:var(--red);font-weight:600;margin-left:6px;}\n.dz-hd .opt{font-size:10.5px;color:var(--text-3);font-weight:500;margin-left:6px;}\n.dz-desc{font-size:12px;color:var(--text-2);margin:6px 0 12px;line-height:1.5;}\n.dz-body{border:1.5px dashed var(--slate-200);border-radius:9px;padding:16px;text-align:center;color:var(--text-3);font-size:12px;background:var(--slate-50);cursor:pointer;}\n.dz-body:hover{background:var(--sky-50);border-color:var(--sky);color:var(--sky);}\n.filerow{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--slate-50);border-radius:8px;margin-top:8px;font-size:12px;}\n.filerow .fic{width:26px;height:26px;border-radius:6px;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--slate-500);flex-shrink:0;}\n.filerow .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.filerow .sz{color:var(--text-3);font-size:11px;flex-shrink:0;}\n.filerow .rm{color:var(--slate-400);flex-shrink:0;}\n.filerow .rm:hover{color:var(--red);}\n\n.manuallink{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--slate-500);padding:9px 2px 2px;}\n.manuallink:hover{color:var(--sky);}\n.manualpanel{margin-top:10px;padding-top:12px;border-top:1px dashed var(--slate-200);}\n.manualpanel .mp-note{font-size:11.5px;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:6px;}\n.mp-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;align-items:end;margin-bottom:10px;}\n.mp-form .mf{display:flex;flex-direction:column;gap:4px;}\n.mp-form .mf label{font-size:10px;font-weight:600;color:var(--slate-500);text-transform:uppercase;letter-spacing:.03em;}\n.mp-form .mf input,.mp-form .mf select{padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:#fff;}\n.mp-addbtn{grid-column:1/-1;justify-self:start;}\n.manualrow{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--sky-50);border-radius:8px;margin-top:6px;font-size:12px;}\n.manualrow .mic{width:24px;height:24px;border-radius:6px;background:#fff;border:1px solid var(--sky-light);display:flex;align-items:center;justify-content:center;color:var(--sky);flex-shrink:0;}\n.manualrow .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.manualrow .meta{color:var(--text-2);font-size:11px;flex-shrink:0;}\n.manualrow .rm{color:var(--slate-400);flex-shrink:0;}\n.manualrow .rm:hover{color:var(--red);}\n.reqwarn{display:flex;gap:9px;align-items:flex-start;background:var(--amber-light);border:1px solid #FDE68A;color:#92400E;border-radius:10px;padding:11px 14px;font-size:12px;margin-bottom:16px;}\n.badge-sky.manual{background:var(--sky-light);color:#0369A1;}\n\n/* ===== processing ===== */\n.proc-wrap{max-width:720px;margin:0 auto;}\n.scan-box{position:relative;background:var(--navy);border-radius:16px;padding:36px 28px;overflow:hidden;margin-bottom:22px;}\n.scan-box::before{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--sky),transparent);top:0;animation:scanline 2.2s linear infinite;box-shadow:0 0 16px 2px rgba(14,165,233,.6);}\n@keyframes scanline{0%{top:0;}100%{top:100%;}}\n.scan-docs{display:flex;gap:14px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}\n.scan-doc{width:52px;height:66px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#93C5FD;font-size:9px;position:relative;}\n.scan-title{color:#fff;text-align:center;font-size:15px;font-weight:600;margin-bottom:4px;}\n.scan-sub{color:#94A3B8;text-align:center;font-size:12px;margin-bottom:20px;}\n.scan-counters{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}\n.scan-counter{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 16px;text-align:center;min-width:96px;}\n.scan-counter .n{font-family:var(--mono);font-size:19px;font-weight:600;color:#fff;}\n.scan-counter .l{font-size:10px;color:#94A3B8;margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}\n.proglog{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:6px;max-height:220px;overflow-y:auto;}\n.logline{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;font-size:12px;color:var(--text-2);animation:fadein .3s ease;}\n.logline .lic{color:var(--emerald);flex-shrink:0;margin-top:1px;}\n.logline b{color:var(--text);font-weight:600;}\n\n/* ===== review screens ===== */\n.reviewtop{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}\n.rt-card{flex:1;min-width:150px;background:var(--white);border:1px solid var(--border);border-radius:11px;padding:13px 16px;}\n.rt-card .n{font-size:21px;font-weight:600;font-family:var(--mono);}\n.rt-card .l{font-size:11.5px;color:var(--text-2);margin-top:2px;}\n.rt-card.warn .n{color:var(--amber);}\n.rt-card.good .n{color:var(--emerald);}\n.rt-card.bad .n{color:var(--red);}\n\n.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}\n.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;background:var(--slate-100);color:var(--slate-700);cursor:pointer;border:1.5px solid transparent;font-weight:500;}\n.chip.active{background:var(--sky-50);color:var(--sky);border-color:var(--sky);}\n.toolbar-right{margin-left:auto;display:flex;gap:8px;}\n\ntable.data{width:100%;border-collapse:collapse;font-size:12.5px;}\ntable.data thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--slate-50);}\ntable.data tbody td{padding:11px 14px;border-bottom:1px solid var(--slate-100);}\ntable.data tbody tr{cursor:pointer;transition:.1s;}\ntable.data tbody tr:hover{background:var(--sky-50);}\ntable.data tbody tr:last-child td{border-bottom:none;}\n.cell-mono{font-family:var(--mono);font-size:11.5px;color:var(--slate-500);}\n.cell-bold{font-weight:600;}\n.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}\n.table-scroll{overflow-x:auto;}\n\n/* drawer */\n.drawer-bg{position:fixed;inset:0;background:rgba(15,23,42,.4);opacity:0;pointer-events:none;transition:.2s;z-index:80;}\n.drawer-bg.open{opacity:1;pointer-events:auto;}\n.drawer{position:fixed;right:0;top:0;height:100vh;width:520px;max-width:92vw;background:#fff;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:.25s cubic-bezier(.4,0,.2,1);z-index:90;display:flex;flex-direction:column;}\n.drawer.open{transform:translateX(0);}\n.drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}\n.drawer-hd h3{font-size:15px;font-weight:600;}\n.drawer-bd{padding:20px 22px;overflow-y:auto;flex:1;}\n.drawer-ft{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}\n.closebtn{width:30px;height:30px;border-radius:8px;color:var(--slate-500);display:flex;align-items:center;justify-content:center;}\n.closebtn:hover{background:var(--slate-100);}\n\n.srcpanel{background:var(--slate-50);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:12px;color:var(--slate-600);position:relative;}\n.srcpanel .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}\n.srcpanel .hl{background:#FEF9C3;padding:1px 3px;border-radius:3px;}\n.dupe-banner{display:flex;gap:10px;align-items:flex-start;background:var(--purple-light);border:1px solid #DDD6FE;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:12px;color:#5B21B6;}\n.dupe-banner b{display:block;margin-bottom:2px;}\n\n/* summary */\n.summarygrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}\n@media(max-width:760px){.summarygrid{grid-template-columns:1fr;}}\n.sumcard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;}\n.sumcard .hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;}\n.sumcard .ic{width:32px;height:32px;border-radius:8px;background:var(--sky-50);color:var(--sky);display:flex;align-items:center;justify-content:center;}\n.sumcard .tt{font-weight:600;font-size:13.5px;}\n.sumcard .row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--text-2);}\n.sumcard .row b{color:var(--text);}\n.readymeter{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:18px;}\n.rm-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}\n.rm-bar{height:8px;border-radius:99px;background:var(--slate-100);overflow:hidden;}\n.rm-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--emerald));border-radius:99px;}\n.issuelist{display:flex;flex-direction:column;gap:8px;}\n.issue{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--amber-light);border-radius:9px;font-size:12px;color:#92400E;}\n.issue.crit{background:var(--red-light);color:#B91C1C;}\n\n/* success */\n.success-wrap{max-width:560px;margin:40px auto 0;text-align:center;}\n.success-ic{width:64px;height:64px;border-radius:50%;background:var(--emerald-light);color:var(--emerald);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}\n.success-stats{display:flex;gap:10px;justify-content:center;margin:24px 0;flex-wrap:wrap;}\n.sstat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 18px;min-width:100px;}\n.sstat .n{font-size:20px;font-weight:600;font-family:var(--mono);color:var(--navy);}\n.sstat .l{font-size:11px;color:var(--text-2);margin-top:2px;}\n\n/* admin queue */\n.qstatus{display:flex;align-items:center;gap:6px;}\n.qstatus .bar{display:flex;gap:2px;}\n.qstatus .seg{width:14px;height:5px;border-radius:2px;background:var(--slate-200);}\n.qstatus .seg.on{background:var(--sky);}\n.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 24px;color:var(--text-2);}\n.empty .ei{width:52px;height:52px;border-radius:12px;background:var(--slate-100);color:var(--slate-400);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}\n\nsvg{display:block;}\n::-webkit-scrollbar{width:8px;height:8px;}\n::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:99px;}\n\n/* ===== trust bar ===== */\n.trustbar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:10px;}\n.trustbar .tb-label{font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:.03em;display:flex;align-items:center;gap:6px;flex-shrink:0;}\n.trustbar .tb-badges{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;}\n@media(max-width:700px){\n  .trustbar{flex-direction:column;align-items:flex-start;gap:6px;}\n  .trustbar .tb-badges{margin-left:0;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;width:100%;justify-content:flex-start;padding-bottom:2px;}\n  .trustbar .tb-badges .badge{flex-shrink:0;}\n}\n\n/* ===== trust & compliance screen ===== */\n.consent-group{border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:10px;background:var(--white);}\n.consent-group .cg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--slate-500);margin-bottom:10px;}\n.consent-row{display:flex;gap:11px;align-items:flex-start;padding:7px 0;cursor:pointer;}\n.consent-row + .consent-row{border-top:1px solid var(--slate-100);}\n.consent-row input{margin:0;flex-shrink:0;width:17px;height:17px;margin-top:1px;accent-color:var(--sky);cursor:pointer;}\n.consent-row .ctext{font-size:12.5px;line-height:1.55;color:var(--slate-700);}\n.consent-row .ctext b{color:var(--text);font-weight:600;}\n.policy-links{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px 16px;padding-top:10px;border-top:1px solid var(--slate-100);}\n.policy-links a{font-size:12px;font-weight:600;color:var(--sky);display:inline-flex;align-items:center;gap:5px;cursor:pointer;}\n.policy-links a:hover{text-decoration:underline;}\n.agreement-prose{font-size:12.5px;line-height:1.7;color:var(--slate-600);}\n.agreement-prose p{margin:0 0 10px;}\n.agreement-prose p:last-child{margin-bottom:0;}\n\n/* ===== audit panel (processing) ===== */\n.proc-two{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}\n@media(max-width:820px){.proc-two{grid-template-columns:1fr;}}\n.auditpanel{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}\n.auditpanel .ap-hd{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px;}\n.auditpanel .ap-body{padding:4px;max-height:240px;overflow-y:auto;}\n.auditline{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;font-size:11.5px;color:var(--text-2);animation:fadein .3s ease;}\n.auditline .at{font-family:var(--mono);font-size:10.5px;color:var(--text-3);flex-shrink:0;min-width:54px;}\n.auditline .ae{color:var(--text);font-weight:600;}\n\n/* ===== validation summary ===== */\n.valresults{display:flex;flex-direction:column;gap:8px;}\n.valrow{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:9px;font-size:12.5px;}\n.valrow.ok{background:var(--emerald-light);color:#047857;}\n.valrow.warn{background:var(--amber-light);color:#92400E;}\n.valrow.dupe{background:var(--purple-light);color:#6D28D9;}\n.valrow.crit{background:var(--red-light);color:#B91C1C;}\n.valrow b{font-weight:700;}\n.confbars{display:flex;flex-direction:column;gap:12px;}\n.confbar .cb-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:var(--slate-600);}\n.confbar .cb-top b{font-family:var(--mono);color:var(--text);}\n.cb-track{height:7px;border-radius:99px;background:var(--slate-100);overflow:hidden;}\n.cb-fill{height:100%;border-radius:99px;}\n\n/* ===== compliance status (final) ===== */\n.compgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;}\n@media(max-width:600px){.compgrid{grid-template-columns:1fr;}}\n.comprow{display:flex;gap:10px;align-items:center;padding:8px 0;font-size:12.5px;}\n.comprow .ci{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.comprow .ci.done{background:var(--emerald-light);color:var(--emerald);animation:pop .18s ease;}\n.comprow .ci.pend{background:var(--amber-light);color:var(--amber);}\n.comprow .clabel{font-weight:500;color:var(--slate-700);}\n@keyframes pop{0%{transform:scale(.8);}60%{transform:scale(1.08);}100%{transform:scale(1);}}\n.finaldecl{border:1px solid var(--border);border-radius:11px;padding:16px;background:var(--slate-50);margin-top:14px;}\n.finaldecl ul{margin:0 0 14px;padding-left:18px;color:var(--slate-600);font-size:12.5px;line-height:1.7;}\n.finalcheck{display:flex;gap:11px;align-items:flex-start;padding-top:12px;border-top:1px solid var(--slate-200);cursor:pointer;}\n.finalcheck input{width:17px;height:17px;margin:1px 0 0;accent-color:var(--sky);cursor:pointer;flex-shrink:0;}\n.finalcheck .ftext{font-size:12.5px;line-height:1.55;color:var(--slate-700);}\n.finalcheck .ftext b{color:var(--text);}\n\n/* ===== report (in-app document) ===== */\n.report-sheet{max-width:800px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-md);overflow:hidden;}\n.report-hd{background:var(--navy);color:#fff;padding:26px 32px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}\n.report-hd .rt{font-size:18px;font-weight:600;}\n.report-hd
